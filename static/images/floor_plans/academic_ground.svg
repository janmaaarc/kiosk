<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="stairs" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#e8dfc5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="#b8a87a" stroke-width="2"/>
    </pattern>
    <style>
      .wall { fill: none; stroke: #333; stroke-width: 4; }
      .room { fill: #ffffff; stroke: #333; stroke-width: 2; }
      .room-yellow { fill: #f4d35e; stroke: #333; stroke-width: 2; }
      .room-cr { fill: #8b1a1a; stroke: #333; stroke-width: 2; }
      .label-elev { font: 700 12px sans-serif; fill: #1a1a1a; text-anchor: middle; letter-spacing: 1px; }
      .label-exit { font: 700 12px sans-serif; fill: #1a1a1a; text-anchor: middle; letter-spacing: 2px; writing-mode: vertical-rl; }
      .label-stairs { font: 700 14px sans-serif; fill: #1a1a1a; text-anchor: middle; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Outer building outline -->
  <rect x="80" y="60" width="1040" height="580" class="wall"/>

  <!-- === TOP ROW === -->
  <rect x="80" y="60" width="200" height="260" class="room"/>
  <rect x="280" y="60" width="140" height="260" class="room-yellow"/>
  <rect x="420" y="60" width="110" height="260" class="room-yellow"/>
  <rect x="530" y="60" width="400" height="260" class="room"/>

  <!-- Elevator -->
  <text x="985" y="80" class="label-elev">ELEVATOR</text>
  <rect x="980" y="95" width="10" height="210" fill="#f4d35e" stroke="#333" stroke-width="1"/>

  <!-- CR (burgundy) -->
  <rect x="1000" y="60" width="120" height="260" class="room-cr"/>

  <!-- === CENTER HALLWAY === -->
  <line x1="80" y1="320" x2="1120" y2="320" stroke="#333" stroke-width="3"/>
  <line x1="80" y1="380" x2="1120" y2="380" stroke="#333" stroke-width="3"/>

  <!-- EXIT labels -->
  <text x="100" y="350" class="label-exit">EXIT</text>
  <text x="1100" y="350" class="label-exit">EXIT</text>

  <!-- === BOTTOM ROW === -->
  <rect x="80" y="380" width="200" height="260" class="room"/>
  <rect x="280" y="380" width="140" height="260" class="room-yellow"/>

  <!-- Left stairs -->
  <rect x="420" y="380" width="85" height="180" fill="url(#stairs)" stroke="#333" stroke-width="2"/>
  <rect x="420" y="560" width="85" height="80" fill="#f4d35e" stroke="#333" stroke-width="2"/>

  <!-- STAIRS labels -->
  <text x="535" y="510" class="label-stairs" transform="rotate(-90 535 510)">STAIRS</text>
  <text x="695" y="510" class="label-stairs" transform="rotate(-90 695 510)">STAIRS</text>

  <!-- Right stairs -->
  <rect x="725" y="380" width="85" height="180" fill="url(#stairs)" stroke="#333" stroke-width="2"/>

  <rect x="810" y="380" width="155" height="260" class="room-yellow"/>
  <rect x="965" y="380" width="155" height="260" class="room-yellow"/>
</svg>
