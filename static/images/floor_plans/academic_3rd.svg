<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="none">
  <defs>
    <pattern id="stairs3" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#d9cfa8"/>
      <line x1="0" y1="0" x2="14" y2="14" stroke="#a89060" stroke-width="1.5"/>
      <line x1="0" y1="14" x2="14" y2="0" stroke="#a89060" stroke-width="1.5"/>
    </pattern>
    <style>
      .bldg-wall { fill: #f0ead8; stroke: #2a2a2a; stroke-width: 5; }
      .room-y    { fill: #f4d35e; stroke: #2a2a2a; stroke-width: 2.5; }
      .room-cr   { fill: #8b1a1a; stroke: #2a2a2a; stroke-width: 2.5; }
      .room-elev { fill: #ffffff; stroke: #2a2a2a; stroke-width: 2; }
      .room-open { fill: #e4dcc4; stroke: #2a2a2a; stroke-width: 2; }
      .hallway   { fill: #e8e0cc; stroke: none; }
      .lbl-exit  { font: 700 11px sans-serif; fill: #1a1a1a; text-anchor: middle; writing-mode: vertical-rl; }
      .lbl-stairs{ font: bold 12px sans-serif; fill: #555; text-anchor: middle; }
      .lbl-elev  { font: bold 11px sans-serif; fill: #333; text-anchor: middle; }
      .lbl-open  { font: bold 10px sans-serif; fill: #777; text-anchor: middle; }
    </style>
  </defs>

  <!-- ── Outer building wall ─────────────────────────────────────────────── -->
  <rect x="80" y="52" width="1040" height="582" class="bldg-wall"/>

  <!-- ── Hallway strip (y=308 → y=392, 84 px) ──────────────────────────── -->
  <rect x="84" y="308" width="1032" height="84" class="hallway"/>
  <line x1="84"  y1="308" x2="1116" y2="308" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="84"  y1="392" x2="1116" y2="392" stroke="#2a2a2a" stroke-width="2"/>
  <text x="96"   y="360" class="lbl-exit">EXIT</text>
  <text x="1104" y="360" class="lbl-exit">EXIT</text>

  <!-- ── TOP ROW ROOMS  (y=56, h=252) ──────────────────────────────────── -->
  <!-- VP for Admin and Finance: left=7% w=7% → x=84 w=84 -->
  <rect x="84"  y="56" width="84"  height="252" class="room-y"/>
  <!-- VP for Academic Affairs: left=14% w=6% → x=168 w=72 -->
  <rect x="168" y="56" width="72"  height="252" class="room-y"/>
  <!-- VP for Research…: left=20% w=7% → x=240 w=84 -->
  <rect x="240" y="56" width="84"  height="252" class="room-y"/>
  <!-- Budget Office: left=27% w=6% → x=324 w=72 -->
  <rect x="324" y="56" width="72"  height="252" class="room-y"/>
  <!-- Accounting Office: left=33% w=7% → x=396 w=84 -->
  <rect x="396" y="56" width="84"  height="252" class="room-y"/>
  <!-- Program Chair's Office: left=40% w=7% → x=480 w=84 -->
  <rect x="480" y="56" width="84"  height="252" class="room-y"/>
  <!-- Dean for Technology: left=47% w=6% → x=564 w=72 -->
  <rect x="564" y="56" width="72"  height="252" class="room-y"/>
  <!-- Dean for Graduate School (wide): left=53% w=13% → x=636 w=156 -->
  <rect x="636" y="56" width="156" height="252" class="room-y"/>
  <!-- CR (dark): left=66% w=7% → x=792 w=84 -->
  <rect x="792" y="56" width="84"  height="252" class="room-cr"/>

  <!-- Elevator area: x=876 → x=1116 (right of CR, not a selectable room) -->
  <rect x="876" y="56" width="240" height="252" fill="#f4f0e4" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Elevator symbol -->
  <rect x="960" y="88" width="72" height="185" class="room-elev"/>
  <polygon points="996,100 978,128 1014,128" fill="#f4d35e"/>
  <rect x="990" y="128" width="12" height="130" fill="#f4d35e" stroke="none"/>
  <text x="996" y="80" class="lbl-elev">ELEVATOR</text>

  <!-- ── BOTTOM ROW ROOMS  (y=392, h=238) ──────────────────────────────── -->
  <!-- College President: left=7% w=7% → x=84 w=84 -->
  <rect x="84"  y="392" width="84"  height="238" class="room-y"/>
  <!-- Board of Secretary: left=14% w=6% → x=168 w=72 -->
  <rect x="168" y="392" width="72"  height="238" class="room-y"/>
  <!-- Conference Room: left=20% w=7% → x=240 w=84 -->
  <rect x="240" y="392" width="84"  height="238" class="room-y"/>
  <!-- Storage (left): left=27% w=6% → x=324 w=72 -->
  <rect x="324" y="392" width="72"  height="238" class="room-y"/>

  <!-- LEFT STAIRS: x=33–40% → x=396 w=84 -->
  <rect x="396" y="392" width="84" height="238" fill="url(#stairs3)" stroke="#2a2a2a" stroke-width="2"/>
  <text x="438" y="525" class="lbl-stairs" transform="rotate(-90 438 525)">STAIRS</text>

  <!-- OPEN SHAFT between stairs: x=40–47% → x=480 w=84 -->
  <rect x="480" y="392" width="84" height="238" class="room-open"/>

  <!-- RIGHT STAIRS: x=47–53% → x=564 w=72 -->
  <rect x="564" y="392" width="72" height="238" fill="url(#stairs3)" stroke="#2a2a2a" stroke-width="2"/>
  <text x="600" y="525" class="lbl-stairs" transform="rotate(-90 600 525)">STAIRS</text>

  <!-- Small landing gap x=636–660 (wall segment between stairs and storage) -->
  <rect x="636" y="392" width="24" height="238" fill="#d4c98a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Storage (right): left=55% w=7% → x=660 w=84 -->
  <rect x="660" y="392" width="84"  height="238" class="room-y"/>
  <!-- Content Creator Laboratory: left=62% w=31% → x=744 w=372 -->
  <rect x="744" y="392" width="372" height="238" class="room-y"/>
</svg>
