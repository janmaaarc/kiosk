<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Indoor Navigation</title>

<style>
body {
  margin: 0;
  font-family: 'League Spartan', sans-serif;
  display: flex;
  height: 100vh;
}

/* LEFT PANEL */
.sidebar {
  width: 300px;
  background: #7b3f3f;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  letter-spacing: 5px;
}

.sidebar ul {
  margin-top: 20px;
  line-height: 1.6;
}

/* MAIN */
.main {
  flex: 1;
  background: #f2f2f2;
  position: relative;
}

.title {
  text-align: center;
  margin-top: 30px;
  font-size: 30px;
  color: #8b3a3a;
}

/* MAP AREA */
.map {
  width: 800px;
  height: 350px;
  background: #e6c54a;
  margin: 40px auto;
  position: relative;
  border: 2px solid black;
}

/* ROOMS */
.room {
  position: absolute;
  background: #f4d35e;
  border: 1px solid black;
  text-align: center;
  font-size: 12px;
  padding-top: 10px;
}

/* ROOM POSITIONS */
.qa { top: 180px; left: 20px; width: 120px; height: 120px; }
.conf { top: 180px; left: 150px; width: 120px; height: 120px; }
.repair { top: 180px; left: 280px; width: 150px; height: 120px; }
.function { top: 180px; left: 450px; width: 200px; height: 120px; }

.record { top: 20px; left: 20px; width: 120px; height: 120px; }
.medical { top: 20px; left: 150px; width: 120px; height: 120px; }
.mpc { top: 20px; left: 280px; width: 150px; height: 120px; }
.faculty { top: 20px; left: 450px; width: 200px; height: 120px; }

/* PATH */
.path {
  position: absolute;
  height: 6px;
  background: purple;
  border-radius: 5px;
}

/* START POINT */
.start {
  position: absolute;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  border: 2px solid black;
}

/* BUTTON */
.roomsBtn {
  position: absolute;
  bottom: 20px;
  right: 20px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>CAMPUS MAP</h2>

  <p><b>DESTINATION:</b><br>ACADEMIC BUILDING</p>

  <ul id="directions">
    <li>Select a room to begin.</li>
  </ul>
</div>

<div class="main">

  <div class="title">CAMPUS MAP</div>

  <div class="map">

    <!-- START POINT -->
    <div class="start" style="top:140px; left:10px;"></div>

    <!-- ROOMS -->
    <div class="room qa">QA OFFICE</div>
    <div class="room conf">CONFERENCE</div>
    <div class="room repair">REPAIR</div>
    <div class="room function">FUNCTION HALL</div>

    <div class="room record">RECORD</div>
    <div class="room medical">MEDICAL</div>
    <div class="room mpc">MPC CARES</div>
    <div class="room faculty">FACULTY</div>

    <!-- PATH -->
    <div id="path"></div>

  </div>

  <button class="roomsBtn" onclick="goToRooms()">SELECT ROOM</button>

</div>

<script>

// GET ROOM FROM URL
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

const path = document.getElementById("path");
const directions = document.getElementById("directions");

// CLEAR PATH
function reset(){
  path.innerHTML = "";
}

// DRAW PATH FUNCTION
function drawPath(x, y, width){
  path.style.top = y + "px";
  path.style.left = "20px";
  path.style.width = width + "px";
}

// LOGIC PER ROOM
if(room){
  reset();

  if(room === "QA"){
    drawPath(0, 200, 120);
    directions.innerHTML = `
      <li>Walk straight</li>
      <li>Turn left</li>
      <li>QA Office is on your left</li>
    `;
  }

  if(room === "Conference"){
    drawPath(0, 200, 250);
    directions.innerHTML = `
      <li>Walk straight</li>
      <li>Proceed forward</li>
      <li>Conference Room is ahead</li>
    `;
  }

  if(room === "Faculty"){
    drawPath(0, 80, 600);
    directions.innerHTML = `
      <li>Walk straight</li>
      <li>Go upstairs</li>
      <li>Faculty Room is on the right</li>
    `;
  }
}

function goToRooms(){
  window.location.href = "/room_navigation";
}

</script>

</body>
</html>
