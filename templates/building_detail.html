<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ building_name }}</title>
<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'League Spartan'; }

body {
  height:100vh;
  overflow:hidden;
  display:flex;
  background:url("/static/images/KIOSK BACKGROUND.png") no-repeat center center fixed;
  background-size:cover;
}

.side-panel {
  width:260px;
  background:linear-gradient(180deg,#7b2d2d,#b85757);
  color:white;
  padding:70px 25px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.side-panel h1 {
  font-size:22px;
  letter-spacing:6px;
  margin-bottom:20px;
}

.floor-btn {
  width:100%;
  padding:14px 20px;
  border:none;
  border-radius:30px;
  background:transparent;
  color:rgba(255,255,255,0.7);
  font-size:17px;
  font-weight:600;
  letter-spacing:1px;
  text-align:left;
  cursor:pointer;
  transition:0.2s;
}
.floor-btn:hover, .floor-btn.active {
  background:white;
  color:#7b2d2d;
}

.main {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  padding:20px 40px;
}

.top-icons {
  position:absolute;
  top:20px;
  left:20px;
  display:flex;
  gap:12px;
}
.top-icons img {
  width:40px;
  cursor:pointer;
  transition:0.2s;
}
.top-icons img:hover { transform:scale(1.1); }

.building-title {
  margin-top:100px;
  font-size:42px;
  font-weight:900;
  letter-spacing:5px;
  color:#7b2d2d;
  text-shadow:0 2px 8px rgba(0,0,0,0.2);
  text-align:center;
}

.floor-view {
  margin-top:30px;
  width:80%;
  flex:1;
  background:white;
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
  gap:20px;
}

.floor-label {
  font-size:26px;
  font-weight:900;
  letter-spacing:3px;
  color:#7b2d2d;
}

.floor-map {
  width:100%;
  height:300px;
  background:#f5e8c0;
  border:3px solid #ccc;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.hallway {
  position:absolute;
  top:45%;
  left:0;
  width:100%;
  height:10%;
  background:#d9d9d9;
  border-top:3px solid #aaa;
  border-bottom:3px solid #aaa;
}

.room-box {
  position:absolute;
  background:#e9e9e9;
  border:2px solid #555;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  font-weight:700;
  text-align:center;
  padding:6px;
}

.map-note {
  font-size:18px;
  color:#888;
  letter-spacing:2px;
}
</style>
</head>
<body>

<div class="side-panel">
  <h1>{{ building_name | upper }}</h1>
  {% for f in floors %}
  <button class="floor-btn {% if loop.first %}active{% endif %}"
          onclick="showFloor({{ loop.index }}, this)">
    FLOOR {{ loop.index }}
  </button>
  {% else %}
  <button class="floor-btn active">GROUND FLOOR</button>
  {% endfor %}
</div>

<div class="main">
  <div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}" onclick="window.location.href='/'">
    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}" onclick="history.back()">
  </div>

  <div class="building-title">{{ building_name | upper }}</div>

  <div class="floor-view">
    <div class="floor-label" id="floorLabel">GROUND FLOOR</div>
    <div class="floor-map">
      <div class="hallway"></div>
      <div class="map-note">FLOOR PLAN COMING SOON</div>
    </div>
  </div>
</div>

<script>
function showFloor(n, btn){
  document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('floorLabel').innerText = 'FLOOR ' + n;
}

const params = new URLSearchParams(window.location.search);
const highlight = params.get('location');
if(highlight){
  document.querySelector('.map-note').innerText = 'LOOKING FOR: ' + highlight.toUpperCase();
}
</script>
</body>
</html>
