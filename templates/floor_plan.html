<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ building_name }} — Floor {{ floor_number }}</title>
<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'League Spartan'; }

body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  background: url("/static/images/KIOSK BACKGROUND.png") no-repeat center center fixed;
  background-size: cover;
}

/* ── Side panel ─────────────────────────────────── */
.side-panel {
  width: 220px;
  flex-shrink: 0;
  background: linear-gradient(180deg, #7b2d2d, #b85757);
  color: white;
  padding: 60px 20px 30px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.side-panel h1 {
  font-size: 16px;
  letter-spacing: 4px;
  margin-bottom: 20px;
  line-height: 1.4;
}

.floor-btn {
  width: 100%;
  padding: 12px 16px;
  border: none;
  border-radius: 30px;
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  text-align: left;
  cursor: pointer;
  transition: 0.2s;
}
.floor-btn:hover, .floor-btn.active {
  background: white;
  color: #7b2d2d;
}

/* ── Main area ───────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px 24px 20px;
  min-width: 0;
}

.top-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.top-bar img {
  width: 38px;
  cursor: pointer;
  transition: 0.2s;
}
.top-bar img:hover { transform: scale(1.1); }
.top-bar h2 {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 4px;
  color: #7b2d2d;
}
.top-bar .show-dir {
  margin-left:auto;
  display:flex;align-items:center;gap:8px;
  color:#1a1a1a;
  font-weight:900;letter-spacing:2px;font-size:15px;
  text-decoration:none;
  padding:8px 14px;
  border-radius:24px;
  transition:background 0.2s;
}
.top-bar .show-dir:hover { background:rgba(123,45,45,0.08); }
.top-bar .show-dir svg { width:22px;height:22px;fill:#7b2d2d; }

/* ── Floor plan wrapper ──────────────────────────── */
.plan-wrapper {
  flex: 1;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  background: white;
  min-height: 0;
}

.plan-wrapper img.floor-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  pointer-events: none;
  user-select: none;
}

/* Placeholder when no image */
.plan-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #aaa;
}

/* ── Room overlays ───────────────────────────────── */
.room-label {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;

  /* default look — transparent so the image shows through */
  background: transparent;
  border: 2px solid transparent;
  border-radius: 6px;

  font-family: inherit;
  font-size: clamp(9px, 1.1vw, 14px);
  font-weight: 800;
  letter-spacing: 0.5px;
  color: #1a1a1a;
  padding: 4px;
  line-height: 1.2;
  text-transform: uppercase;

  transition: background 0.2s, border-color 0.2s, color 0.2s;
}

.room-label:hover {
  background: rgba(139, 46, 46, 0.85);
  border-color: white;
  color: white;
}

/* White text for rooms on dark backgrounds */
.room-label[data-name="CR"] { color: white; }

/* Indoor YOU ARE HERE pin */
.indoor-pin {
  position:absolute;
  width:44px;
  height:56px;
  transform:translate(-50%,-100%);
  pointer-events:none;
  z-index:8;
}
.indoor-pin .pin {
  width:44px;height:44px;
  background:#8b1a1a;
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.35);
}
.indoor-pin .pin-text {
  transform:rotate(45deg);
  color:#fff;
  font-weight:900;
  font-size:8px;
  text-align:center;
  line-height:1;
  letter-spacing:0.5px;
}
@keyframes dash-march {
  to { stroke-dashoffset: -10; }
}
#indoorRouteLine { animation: dash-march 0.8s linear infinite; }

/* Highlighted (e.g. from search) */
.room-label.highlighted {
  background: rgba(255, 220, 0, 0.9);
  border-color: #8b2e2e;
  color: #1a0000;
  animation: pulse 1.2s infinite alternate;
}
@keyframes pulse {
  from { box-shadow: 0 0 0 0 rgba(255,220,0,0.6); }
  to   { box-shadow: 0 0 0 8px rgba(255,220,0,0); }
}

/* ── Info panel (slide-up on room tap) ────────────── */
.info-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,0.97);
  border-top: 3px solid #8b2e2e;
  padding: 18px 28px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  z-index: 10;
}
.info-panel.visible {
  transform: translateY(0);
}
.info-panel h3 {
  font-size: 20px;
  font-weight: 900;
  color: #7b2d2d;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.info-panel p {
  font-size: 15px;
  color: #444;
}
.info-close {
  position: absolute;
  top: 12px;
  right: 16px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: #7b2d2d;
  font-family: inherit;
  font-weight: 900;
}
</style>
</head>
<body>

<!-- Side panel: floor switcher -->
<div class="side-panel">
  <h1>{{ building_name | upper }}</h1>
  {% for floor in all_floors %}
  <button class="floor-btn {% if floor.number == floor_number %}active{% endif %}"
          onclick="switchFloor('{{ floor.url }}')">
    {{ floor.label | upper }}
  </button>
  {% endfor %}
</div>

<!-- Main -->
<div class="main">
  <div class="top-bar">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}"
         onclick="window.location.href='/menu'" alt="Home">
    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}"
         onclick="history.back()" alt="Back">
    <h2>{{ building_name | upper }} — {{ floor_label | upper }}</h2>
    <a class="show-dir" href="/campus_map?location={{ building_name | upper | urlencode }}">
      SHOW DIRECTION
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </a>
  </div>
  <div class="plan-wrapper" id="planWrapper">

    {% if floor_image %}
    <img class="floor-img" src="{{ url_for('static', filename=floor_image) }}" alt="Floor plan">
    {% else %}
    <div class="plan-placeholder">FLOOR PLAN IMAGE COMING SOON</div>
    {% endif %}

    <!-- Indoor route overlay (drawn only when a room is highlighted) -->
    <svg id="indoorRouteSVG" viewBox="0 0 100 100" preserveAspectRatio="none"
         style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;">
      <path id="indoorRouteLine" fill="none" stroke="#8e44ad" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2"
            style="display:none"/>
    </svg>

    <!-- YOU ARE HERE pin at building entrance -->
    <div id="indoorYouHere" class="indoor-pin" style="display:none">
      <div class="pin"><div class="pin-text">YOU<br>ARE<br>HERE.</div></div>
    </div>

    <!-- Room labels: left/top/width/height are percentages of the wrapper -->
    {% for room in rooms %}
    <button class="room-label {% if highlight and highlight|lower == room.name|lower %}highlighted{% endif %}"
            style="left:{{ room.left }}%; top:{{ room.top }}%; width:{{ room.width }}%; height:{{ room.height }}%;"
            data-name="{{ room.name }}"
            data-desc="{{ room.desc | default('') }}"
            data-office-key="{{ room.office_key | default('') }}"
            data-left="{{ room.left }}"
            data-top="{{ room.top }}"
            data-width="{{ room.width }}"
            data-height="{{ room.height }}"
            onclick="handleRoomClick(this)">
      {{ room.name }}
    </button>
    {% endfor %}

    <!-- Slide-up info panel -->
    <div class="info-panel" id="infoPanel">
      <button class="info-close" onclick="closeInfo()">✕</button>
      <h3 id="infoName"></h3>
      <p id="infoDesc"></p>
      <div style="display:flex;gap:14px;align-items:center;margin-top:10px;flex-wrap:wrap">
        <a id="infoOfficeBtn" href="#" style="display:none;background:#7b2d2d;color:#fff;
             padding:10px 18px;border-radius:22px;font-weight:900;letter-spacing:1.5px;
             text-decoration:none;font-size:13px;">OPEN OFFICE PAGE →</a>
        <img id="infoQR" src="" alt="QR code"
             style="width:80px;height:80px;display:none;border-radius:4px">
      </div>
    </div>

  </div>
</div>

<script>
function switchFloor(url) {
  const wrap = document.getElementById('planWrapper');
  wrap.style.transition = 'opacity 0.25s ease';
  wrap.style.opacity = '0';
  setTimeout(() => { window.location.href = url; }, 250);
}

// Current building info for back-links
const BUILDING_URL  = '{{ request.path }}';
const FLOOR_NUMBER  = {{ floor_number }};

function handleRoomClick(btn) {
  // Always draw the indoor route to the clicked room + show its info.
  document.querySelectorAll('.room-label').forEach(b => b.classList.remove('highlighted'));
  btn.classList.add('highlighted');
  drawIndoorRoute(btn);
  showInfo(btn);
}

function showInfo(btn) {
  document.getElementById('infoName').textContent = btn.dataset.name;
  document.getElementById('infoDesc').textContent = btn.dataset.desc || '';
  const qr = document.getElementById('infoQR');
  const officeBtn = document.getElementById('infoOfficeBtn');
  const officeKey = btn.dataset.officeKey;
  if (officeKey) {
    const from = encodeURIComponent(BUILDING_URL);
    const roomParam = encodeURIComponent(btn.dataset.name);
    officeBtn.href = `/office?name=${officeKey}&from_building=${from}&from_floor=${FLOOR_NUMBER}&from_room=${roomParam}`;
    officeBtn.style.display = 'inline-block';
    const dest = window.location.origin + '/office?name=' + encodeURIComponent(officeKey);
    qr.src = '/qr?size=200&data=' + encodeURIComponent(dest);
    qr.style.display = 'block';
  } else {
    officeBtn.style.display = 'none';
    qr.style.display = 'none';
  }
  document.getElementById('infoPanel').classList.add('visible');
}
function closeInfo() {
  document.getElementById('infoPanel').classList.remove('visible');
}

// Highlight room from ?location= param (e.g. coming from office directions)
const params = new URLSearchParams(window.location.search);
const loc = params.get('location');
if (loc) {
  document.querySelectorAll('.room-label').forEach(b => {
    if (b.dataset.name.toLowerCase() === loc.toLowerCase()) {
      b.classList.add('highlighted');
      drawIndoorRoute(b);
    }
  });
}

// Draw a dashed route from the building entrance to the target room.
// All coordinates are in percentages of the plan-wrapper (0..100)
// so they scale with the container.
function drawIndoorRoute(targetBtn) {
  const left = parseFloat(targetBtn.dataset.left);
  const top = parseFloat(targetBtn.dataset.top);
  const width = parseFloat(targetBtn.dataset.width);
  const height = parseFloat(targetBtn.dataset.height);
  if ([left, top, width, height].some(Number.isNaN)) return;

  const roomCx = left + width / 2;
  const roomCy = top + height / 2;

  // Entrance assumed to be the bottom-center of the floor plan
  const entranceX = 50;
  const entranceY = 96;

  // Walk along the central hallway (y ~ 50) to the column above the room,
  // then step up/down into the room.
  const hallwayY = 50;
  const corridorX = roomCx;
  const d = `M ${entranceX} ${entranceY} L ${entranceX} ${hallwayY} L ${corridorX} ${hallwayY} L ${corridorX} ${roomCy}`;

  const line = document.getElementById('indoorRouteLine');
  line.setAttribute('d', d);
  line.style.display = 'block';

  const pin = document.getElementById('indoorYouHere');
  pin.style.left = entranceX + '%';
  pin.style.top = entranceY + '%';
  pin.style.display = 'block';
}

// ── Entrance animation ─────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Stagger room labels in
  document.querySelectorAll('.room-label').forEach((b, i) => {
    b.style.opacity = '0';
    b.style.transform = 'scale(0.85)';
    b.style.transition = `opacity 0.3s ease ${i * 40}ms, transform 0.3s ease ${i * 40}ms`;
    requestAnimationFrame(() => {
      setTimeout(() => {
        b.style.opacity = '';
        b.style.transform = '';
      }, 60 + i * 40);
    });
  });

  // Slide side panel in from left
  const side = document.querySelector('.side-panel');
  if (side) {
    side.style.transform = 'translateX(-100%)';
    side.style.transition = 'transform 0.4s cubic-bezier(0.16,1,0.3,1)';
    requestAnimationFrame(() => setTimeout(() => { side.style.transform = ''; }, 30));
  }

  // Fade plan wrapper in
  const wrap = document.getElementById('planWrapper');
  if (wrap) {
    wrap.style.opacity = '0';
    wrap.style.transform = 'translateY(14px)';
    wrap.style.transition = 'opacity 0.45s ease 0.15s, transform 0.45s ease 0.15s';
    requestAnimationFrame(() => setTimeout(() => {
      wrap.style.opacity = '';
      wrap.style.transform = '';
    }, 30));
  }
});
</script>
</body>
</html>
