<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Offline — Kiosk</title>
<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'League Spartan', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #f9f3f3;
  color: #7b2d2d;
  text-align: center;
  gap: 16px;
}
h1 {
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 900;
  letter-spacing: 4px;
}
p {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #555;
}
button {
  margin-top: 12px;
  padding: 14px 32px;
  background: #7b2d2d;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 2px;
  cursor: pointer;
}
</style>
</head>
<body>
  <h1>YOU'RE OFFLINE</h1>
  <p>PLEASE CHECK YOUR CONNECTION AND TRY AGAIN</p>
  <button onclick="window.location.reload()">RETRY</button>
</body>
</html>
