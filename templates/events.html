<!DOCTYPE html>
<html>
<head>
    <title>Events</title>

    <style>
        @font-face {
            font-family: 'League Spartan';
            src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
        }
        
        body {
            margin: 0;
            font-family: 'League Spartan', sans-serif;
            background: url("/static/images/KIOSK BACKGROUND.png") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            font-size: 60px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #8b2e2e;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            margin-top: 80px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            padding: 40px;
            overflow-y: auto;
            align-content: start;
        }

        .card {
            cursor: pointer;
            transition: 0.3s;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .top-icons{
            position:absolute;
            top:15px;
            left: 20px;
            display:flex;
            gap:15px;
            z-index:10;
        }

        .top-icons img{
            width:44px;
            cursor:pointer;
            transition:0.2s;
        }

        .top-icons img:hover{
            transform:scale(1.1);
        }

        .icon{
            width:35px;
            height:35px;
            border:2px solid black;
            border-radius:50%;
        }

        .admin-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.18);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 100;
            text-decoration: none;
        }
        .admin-btn:hover { background: rgba(0,0,0,0.4); }
        .admin-btn svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.7); }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px 0 30px;
            flex-shrink: 0;
        }
        .page-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            color: #7b2d2d;
            transition: 0.2s;
        }
        .page-btn:hover { background: #7b2d2d; color: white; }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-info {
            color: white;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<h1>EVENTS AND ACTIVITIES</h1>

<div class="grid" id="eventsGrid"></div>
<div class="pagination">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ PREV</button>
    <span class="page-info" id="pageInfo"></span>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)">NEXT ▶</button>
</div>

<div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}"
         class="top-icon" alt="Home" onclick="goHome()">

    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}"
         class="top-icon" alt="Back" onclick="goBack()">
</div>

<script>
const ALL_EVENTS = {{ events | tojson }};
const PER_PAGE = 9;
let currentPage = 1;

function renderPage(page){
    const grid  = document.getElementById('eventsGrid');
    const start = (page - 1) * PER_PAGE;
    const slice = ALL_EVENTS.slice(start, start + PER_PAGE);
    grid.textContent = '';
    slice.forEach(ev => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => go(ev.id);
        const img = document.createElement('img');
        img.src = '/static/' + ev.image;
        div.appendChild(img);
        grid.appendChild(div);
    });
    const total = Math.ceil(ALL_EVENTS.length / PER_PAGE);
    document.getElementById('pageInfo').textContent = 'PAGE ' + page + ' / ' + total;
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= total;
    grid.scrollTop = 0;
}

function changePage(dir){
    const total = Math.ceil(ALL_EVENTS.length / PER_PAGE);
    currentPage = Math.max(1, Math.min(total, currentPage + dir));
    renderPage(currentPage);
}

renderPage(1);

function go(id){
    window.location.href = "/event/" + id;
}

function goBack(){
  window.history.back();
}

function goHome(){
  window.location.href = "/menu";
}

</script>

<a href="/admin" class="admin-btn" title="Admin">
    <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
</a>
<script src="/static/js/toast.js"></script>
<script src="/static/js/drag-scroll.js"></script>
</body>
</html>
