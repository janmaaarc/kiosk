<!DOCTYPE html>
<html>
<head>
    <title>Events</title>

    <style>
        @font-face {
            font-family: 'League Spartan';
            src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
        }
        
        body {
            margin: 0;
            font-family: 'League Spartan', sans-serif;
            background: url("/static/images/KIOSK BACKGROUND.png") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 60px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #8b2e2e;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            margin-top: 80px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            padding: 40px;
            overflow-y: auto;
            align-content: start;
        }

        .card {
            cursor: pointer;
            transition: 0.3s;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .top-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .top-icon {
            width: 44px;
            height: 44px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .top-icon:hover { transform: scale(1.1); }

        .topbar {
            position: absolute;
            top: 20px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }

        .search {
            padding: 14px 20px 14px 48px;
            border-radius: 30px;
            border: 3px solid rgba(255,255,255,0.85);
            width: 320px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: inherit;
            background: rgba(255,255,255,0.92);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            color: #333;
        }
        .search:focus { border-color: #8b2e2e; box-shadow: 0 4px 20px rgba(139,46,46,0.25); }
        .search::placeholder { color: #999; font-weight: 600; }

        .search-wrap { position: relative; }
        .search-wrap::before {
            content: "⌕";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #aaa;
            pointer-events: none;
        }

        .icon {
            width: 44px;
            height: 44px;
            border: 2px solid #e0c0c0;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .icon:hover { transform: scale(1.1); }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px 0 30px;
            flex-shrink: 0;
        }
        .page-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 14px;
            padding: 18px 40px;
            font-family: inherit;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            color: #7b2d2d;
            transition: 0.2s;
            min-width: 140px;
        }
        .page-btn:hover { background: #7b2d2d; color: white; }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-info {
            color: white;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }

    </style>
</head>

<body>

<h1>EVENTS AND ACTIVITIES</h1>

<div class="topbar">
    <div class="search-wrap">
        <input type="text" id="eventSearch" class="search" placeholder="Search events…" oninput="filterEvents(this.value)">
    </div>
    <a href="/admin" class="icon" title="Admin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#333"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
    </a>
</div>

<div class="grid" id="eventsGrid"></div>
<div class="pagination">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ PREV</button>
    <span class="page-info" id="pageInfo"></span>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)">NEXT ▶</button>
</div>

<div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}"
         class="top-icon" alt="Home" onclick="goHome()">

    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}"
         class="top-icon" alt="Back" onclick="goBack()">
</div>

<script>
const ALL_EVENTS = {{ events | tojson }};
const PER_PAGE = 9;
let currentPage = 1;
let filteredEvents = ALL_EVENTS.slice();

function renderPage(page){
    const grid  = document.getElementById('eventsGrid');
    const start = (page - 1) * PER_PAGE;
    const slice = filteredEvents.slice(start, start + PER_PAGE);
    grid.textContent = '';
    if (!slice.length) {
        const msg = document.createElement('p');
        msg.style.cssText = 'color:white;font-weight:700;font-size:22px;letter-spacing:1px;grid-column:1/-1;text-align:center;margin-top:40px;';
        msg.textContent = 'No events found.';
        grid.appendChild(msg);
    }
    slice.forEach(ev => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => go(ev.id);
        const img = document.createElement('img');
        img.src = '/static/' + ev.image;
        div.appendChild(img);
        grid.appendChild(div);
    });
    const total = Math.max(1, Math.ceil(filteredEvents.length / PER_PAGE));
    document.getElementById('pageInfo').textContent = 'PAGE ' + page + ' / ' + total;
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= total;
    grid.scrollTop = 0;
}

function changePage(dir){
    const total = Math.max(1, Math.ceil(filteredEvents.length / PER_PAGE));
    currentPage = Math.max(1, Math.min(total, currentPage + dir));
    renderPage(currentPage);
}

function filterEvents(q) {
    const term = q.trim().toLowerCase();
    filteredEvents = term
        ? ALL_EVENTS.filter(ev => (ev.title || '').toLowerCase().includes(term))
        : ALL_EVENTS.slice();
    currentPage = 1;
    renderPage(1);
}

renderPage(1);

function go(id){
    window.location.href = "/event/" + id;
}

function goBack(){
  window.history.back();
}

function goHome(){
  window.location.href = "/menu";
}

</script>

<script src="/static/js/toast.js?v=2"></script>
<script src="/static/js/drag-scroll.js?v=2"></script>
<script src="/static/js/keyboard.js?v=2"></script>
</body>
</html>
