<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Directions</title>
<style>
:root {
  --red:    #7b2d2d;
  --red-dk: #5a1f1f;
  --f: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#1a0a0a; font-family:var(--f); }

/* ── Outer shell — always fills screen ───────────── */
.wrap {
  position: fixed; inset: 0;
  display: flex;
  overflow: hidden;
}

/* ════════════════════════════════════════════════
   LEFT PANEL
════════════════════════════════════════════════ */
.panel {
  width: 27%;
  flex-shrink: 0;
  background: linear-gradient(175deg, var(--red) 0%, var(--red-dk) 100%);
  color: #fff;
  padding: max(40px, env(safe-area-inset-top)) 11px 18px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.p-header {
  font-size: clamp(5px,1.6vw,10px);
  font-weight: 900;
  letter-spacing: 3px;
  color: rgba(255,255,255,.42);
  margin-bottom: 8px;
}
.p-dest-label {
  font-size: clamp(5px,1.4vw,8px);
  letter-spacing: 2px;
  color: rgba(255,255,255,.55);
  margin-bottom: 2px;
}
.p-dest-name {
  font-size: clamp(8px,2.4vw,14px);
  font-weight: 900;
  letter-spacing: 0.5px;
  line-height: 1.2;
  margin-bottom: 14px;
}
.p-dir-heading {
  font-size: clamp(7px,2vw,12px);
  font-weight: 900;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.panel ul {
  list-style: disc;
  padding-left: 13px;
  flex: 1;
}
.panel ul li {
  font-size: clamp(5.5px,1.6vw,9.5px);
  line-height: 1.6;
  margin-bottom: 3px;
  color: rgba(255,255,255,.88);
}
.p-inside {
  font-size: clamp(7px,2vw,12px);
  font-weight: 900;
  letter-spacing: 1px;
  margin-top: 12px;
  color: rgba(255,255,255,.9);
}

/* ════════════════════════════════════════════════
   RIGHT SIDE
════════════════════════════════════════════════ */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Map section (top 60%) ─────────────────────── */
.map-section {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.map-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.32;
}
/* top-right badges */
.map-badge {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(123,45,45,.95);
  color: #fff;
  font-size: clamp(4px,1.2vw,7px);
  font-weight: 900;
  letter-spacing: 1.5px;
  padding: 3px 6px;
  border-radius: 4px;
}
.map-toggle {
  position: absolute;
  top: 26px; right: 8px;
  display: flex;
  border-radius: 6px;
  overflow: hidden;
  font-size: clamp(4px,1.2vw,7px);
  font-weight: 900;
  letter-spacing: 1px;
}
.map-toggle span {
  padding: 3px 6px;
  background: rgba(255,255,255,.92);
  color: #888;
}
.map-toggle span.on {
  background: var(--red);
  color: #fff;
}

/* ── White card (centered in map section) ────────── */
.map-card {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}
.card-inner {
  background: rgba(255,255,255,.97);
  border-radius: 10px;
  box-shadow: 0 6px 28px rgba(0,0,0,.22);
  padding: 10px 10px 8px;
  width: 100%;
  max-width: 340px;
}
.card-title {
  font-size: clamp(7px,2vw,12px);
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--red);
  margin-bottom: 2px;
}
.card-dest {
  font-size: clamp(5.5px,1.5vw,9px);
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #666;
  margin-bottom: 8px;
}
/* Mini campus map SVG wrapper */
.mini-map {
  width: 100%;
  border-radius: 6px;
  overflow: hidden;
  background: #f0ebe3;
}
.mini-map svg {
  display: block;
  width: 100%;
  height: auto;
}

/* ── Photo section (bottom 40%) ─────────────────── */
.photo-section {
  height: 40%;
  flex-shrink: 0;
  overflow: hidden;
  background: #c8b8a0;
  position: relative;
}
.photo-section img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="p-header">CAMPUS MAP</div>
    <div class="p-dest-label">DESTINATION:</div>
    <div class="p-dest-name" id="dest-name"></div>
    <div class="p-dir-heading">Directions</div>
    <ul id="steps"></ul>
    <div class="p-inside" id="inside-lbl" style="display:none">Inside the Building:</div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- Map section -->
    <div class="map-section">
      <img class="map-bg" src="/static/images/KIOSK BACKGROUND.png" alt="">
      <div class="map-badge">STEP 2: BUILDING LAYOUT</div>
      <div class="map-toggle">
        <span class="on">OUTSIDE</span><span>INSIDE</span>
      </div>

      <!-- Centered white card with mini-map -->
      <div class="map-card">
        <div class="card-inner">
          <div class="card-title">CAMPUS MAP</div>
          <div class="card-dest" id="card-dest">DESTINATION: —</div>
          <div class="mini-map">
            <!-- Static simplified campus map SVG -->
            <svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
              <rect width="320" height="180" fill="#f0ebe3"/>
              <!-- roads -->
              <rect x="0" y="100" width="280" height="12" fill="#d8cfc4"/>
              <rect x="40" y="0"  width="8"   height="180" fill="#d8cfc4"/>
              <rect x="80" y="40" width="6"   height="130" fill="#d8cfc4"/>
              <rect x="120" y="40" width="6"  height="130" fill="#d8cfc4"/>
              <rect x="160" y="40" width="6"  height="130" fill="#d8cfc4"/>
              <rect x="200" y="40" width="6"  height="130" fill="#d8cfc4"/>
              <rect x="240" y="40" width="6"  height="130" fill="#d8cfc4"/>
              <rect x="280" y="0"  width="6"  height="180" fill="#d8cfc4"/>
              <rect x="0"  y="40"  width="280" height="6" fill="#d8cfc4"/>
              <!-- Buildings - yellow -->
              <rect x="50" y="8"  width="120" height="6"  rx="2" fill="#f4d35e"/><!-- Rodriguez -->
              <rect x="180" y="8" width="60"  height="28" rx="2" fill="#f4d35e"/><!-- MIST Dorm -->
              <rect x="10" y="46" width="28"  height="48" rx="2" fill="#f4d35e"/><!-- MIST Building -->
              <rect x="50" y="48" width="26"  height="44" rx="2" fill="#f4d35e"/><!-- Ylagan -->
              <!-- ACADEMIC BUILDING — highlighted -->
              <rect x="86" y="46" width="56"  height="48" rx="2" fill="#ff5722" stroke="#fff" stroke-width="1.5"/>
              <text x="114" y="73" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="5" font-weight="700" fill="#fff">ACADEMIC</text>
              <text x="114" y="80" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="5" font-weight="700" fill="#fff">BLDG</text>
              <rect x="180" y="50" width="50"  height="24" rx="2" fill="#f4d35e"/>
              <rect x="180" y="68" width="26"  height="12" rx="1" fill="#f4d35e"/>
              <rect x="10"  y="110" width="26" height="52" rx="2" fill="#f4d35e"/><!-- New Admin -->
              <rect x="50"  y="118" width="16" height="42" rx="2" fill="#f4d35e"/><!-- Old Admin -->
              <rect x="86"  y="118" width="36" height="42" rx="2" fill="#f4d35e"/><!-- FSM -->
              <rect x="130" y="110" width="14" height="52" rx="2" fill="#f4d35e"/>
              <rect x="148" y="110" width="14" height="52" rx="2" fill="#f4d35e"/>
              <rect x="166" y="110" width="14" height="52" rx="2" fill="#f4d35e"/>
              <rect x="186" y="110" width="74" height="42" rx="2" fill="#f4d35e"/><!-- Tech -->
              <rect x="290" y="8"  width="26"  height="36" rx="2" fill="#f4d35e"/>
              <rect x="290" y="48" width="26"  height="36" rx="2" fill="#f4d35e"/>
              <rect x="290" y="88" width="26"  height="84" rx="2" fill="#f4d35e"/>
              <!-- Route line -->
              <polyline points="4,100 4,112 96,112 96,94" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,2" stroke-linecap="round"/>
              <!-- YOU ARE HERE dot -->
              <circle cx="4" cy="100" r="4" fill="#8b1a1a"/>
              <text x="4" y="88" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="4" fill="#8b1a1a" font-weight="900">YOU</text>
              <text x="4" y="93" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="4" fill="#8b1a1a" font-weight="900">HERE</text>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Building photo -->
    <div class="photo-section" id="photo-section"></div>

  </div>
</div>

<script>
var p    = new URLSearchParams(window.location.search);
var DEST = (p.get("location") || "").trim().toUpperCase();
var IMG  = p.get("img") || "";

function tc(s) {
  return s.split(" ").filter(function(w){ return w.length > 0; }).map(function(w){
    return w[0].toUpperCase() + w.slice(1).toLowerCase();
  }).join(" ");
}

var name = DEST ? tc(DEST) : "Unknown";
document.getElementById("dest-name").textContent = name;
document.getElementById("card-dest").textContent  = "DESTINATION: " + DEST;

if (IMG && IMG.startsWith("/static/")) {
  var img = document.createElement("img");
  img.src = IMG; img.alt = name;
  document.getElementById("photo-section").appendChild(img);
}

var CUSTOM = {
  "ACADEMIC BUILDING":["You are currently here.","Walk straight ahead.","At the intersection, turn left.","The Academic Building is on your right.","Enter through the main entrance."],
  "NEW ADMIN BUILDING":["Exit through the main gate.","Turn left immediately after the gate.","The New Admin Building is on your right."],
  "OLD ADMIN BUILDING":["Exit through the main gate.","Turn left after the gate.","Walk past the New Admin Building.","The Old Admin Building is on your left."]
};
var EDGES = {
  "GATE":["LAST HORIZONTAL ROAD"],
  "LAST HORIZONTAL ROAD":["GATE","MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","FSM BUILDING"],
  "MAIN HORIZONTAL ROAD":["LAST HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","1ST VERTICAL ROAD","2ND VERTICAL ROAD","3RD VERTICAL ROAD","4TH VERTICAL ROAD","5TH VERTICAL ROAD","6TH VERTICAL ROAD","7TH VERTICAL ROAD","8TH VERTICAL ROAD"],
  "4TH VERTICAL ROAD":["MAIN HORIZONTAL ROAD","ACADEMIC BUILDING"],
  "ACADEMIC BUILDING":["4TH VERTICAL ROAD"],
  "1ST VERTICAL ROAD":["MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","OLD ADMIN BUILDING"],
  "NEW ADMIN BUILDING":["1ST VERTICAL ROAD","LAST HORIZONTAL ROAD"],
  "OLD ADMIN BUILDING":["1ST VERTICAL ROAD"]
};
function bfs(s,e){var q=[[s]],seen={};seen[s]=true;while(q.length){var path=q.shift(),node=path[path.length-1];if(node===e)return path;var nb=EDGES[node]||[];for(var i=0;i<nb.length;i++){if(!seen[nb[i]]){seen[nb[i]]=true;q.push(path.concat(nb[i]));}}}return null;}

var steps = DEST ? (CUSTOM[DEST] || (function(){
  var path = bfs("GATE", DEST);
  return (path && path.length > 1)
    ? path.slice(1,-1).map(function(n){ return "Head toward " + tc(n); })
    : ["Walk straight from the main entrance toward " + tc(DEST)];
})()) : [];

var ul = document.getElementById("steps");
for (var i = 0; i < steps.length; i++) {
  var li = document.createElement("li");
  li.textContent = steps[i];
  ul.appendChild(li);
}
if (steps.length) document.getElementById("inside-lbl").style.display = "block";
</script>
</body>
</html>
