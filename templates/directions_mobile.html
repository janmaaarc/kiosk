<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Directions</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
html, body { width: 100%; min-height: 100dvh; background: #f5f0f0; }

/* TOP SECTION — white, matches TV building panel */
.top-section {
  background: #fff;
  padding: max(40px, env(safe-area-inset-top)) 28px 28px;
}
.building-label {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 10px;
}
.building-name {
  font-size: clamp(24px, 7vw, 36px);
  font-weight: 900;
  color: #7b2d2d;
  letter-spacing: 2px;
  line-height: 1.2;
  margin-bottom: 20px;
}
.building-photo {
  width: 100%;
  height: clamp(160px, 45vw, 220px);
  object-fit: cover;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  display: none;
}
.btn-enter {
  display: block;
  width: 100%;
  background: #7b2d2d;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 16px 24px;
  font-size: clamp(14px, 4vw, 16px);
  font-weight: 900;
  letter-spacing: 2px;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  margin-bottom: 0;
}

/* DIVIDER */
.section-divider {
  height: 6px;
  background: #f5f0f0;
}

/* DIRECTIONS SECTION — dark red, matches TV directions panel */
.dir-section {
  background: linear-gradient(180deg, #7b2d2d 0%, #5a1f1f 100%);
  padding: 32px 28px max(32px, env(safe-area-inset-bottom));
  min-height: 40dvh;
}
.dir-label {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
}
.dir-heading {
  font-size: clamp(18px, 5vw, 22px);
  font-weight: 900;
  color: #fff;
  letter-spacing: 1px;
  margin-bottom: 24px;
}
ul.steps { list-style: none; padding: 0; }
ul.steps li {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  font-size: clamp(15px, 4.2vw, 18px);
  line-height: 1.5;
  color: #fff;
  margin-bottom: 18px;
}
.num {
  min-width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(12px, 3.5vw, 14px);
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.arrive {
  margin-top: 24px;
  padding: 18px;
  border-radius: 12px;
  background: rgba(255,255,255,0.15);
  font-size: clamp(15px, 4.2vw, 18px);
  font-weight: 700;
  color: #fff;
}
.error {
  margin-top: 24px;
  padding: 18px;
  border-radius: 12px;
  background: rgba(0,0,0,0.2);
  font-size: clamp(13px, 3.8vw, 16px);
  color: rgba(255,255,255,0.8);
}
</style>
</head>
<body>

<div class="top-section">
  <div class="building-label">BUILDING</div>
  <div class="building-name" id="dest-name"></div>
  <img class="building-photo" id="building-photo" src="" alt="">
  <a class="btn-enter" id="enter-btn" href="#" style="display:none">ENTER BUILDING</a>
</div>

<div class="section-divider"></div>

<div class="dir-section">
  <div class="dir-label">FROM MAIN ENTRANCE</div>
  <div class="dir-heading">Directions</div>
  <ul class="steps" id="steps"></ul>
  <div class="arrive" id="arrive-msg" style="display:none"></div>
  <div class="error" id="error-msg" style="display:none"></div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var DEST  = (params.get("location") || "").trim().toUpperCase();
var IMG   = params.get("img") || "";
var BURL  = params.get("burl") || "";

var destEl = document.getElementById("dest-name");
destEl.textContent = DEST ? titleCase(DEST) : "Unknown";

if (IMG) {
  var photo = document.getElementById("building-photo");
  photo.src = IMG;
  photo.style.display = "block";
}

if (BURL) {
  var btn = document.getElementById("enter-btn");
  btn.href = BURL;
  btn.style.display = "block";
}

var edges = {
  "GATE": ["LAST HORIZONTAL ROAD"],
  "LAST HORIZONTAL ROAD": ["GATE","MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","FSM BUILDING"],
  "MAIN HORIZONTAL ROAD": ["LAST HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","1ST VERTICAL ROAD","2ND VERTICAL ROAD","3RD VERTICAL ROAD","4TH VERTICAL ROAD","5TH VERTICAL ROAD","6TH VERTICAL ROAD","7TH VERTICAL ROAD","8TH VERTICAL ROAD"],
  "SECOND HORIZONTAL ROAD": ["MAIN HORIZONTAL ROAD","MULTI-PURPOSE BUILDING","MIST-NCESTD BUILDING"],
  "1ST VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","OLD ADMIN BUILDING"],
  "2ND VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","MIST-NCESTD DORM","RODRIGUEZ BUILDING","MULTI-PURPOSE BUILDING","YLAGAN HALL"],
  "3RD VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","AUTOMOTIVE BUILDING","CIVIL TECH BUILDING"],
  "4TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","ACADEMIC BUILDING"],
  "5TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","TECH BUILDING"],
  "6TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","IT BUILDING"],
  "7TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","MECHANICAL BUILDING"],
  "8TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","WAF & RAC BUILDING","SCIENCE BUILDING","TE BUILDING","POWER ROOM","GRADUATE SCHOOL BUILDING"],
  "NEW ADMIN BUILDING": ["1ST VERTICAL ROAD","LAST HORIZONTAL ROAD"],
  "OLD ADMIN BUILDING": ["1ST VERTICAL ROAD"],
  "FSM BUILDING": ["LAST HORIZONTAL ROAD"],
  "YLAGAN HALL": ["2ND VERTICAL ROAD"],
  "RODRIGUEZ BUILDING": ["2ND VERTICAL ROAD"],
  "MIST-NCESTD DORM": ["2ND VERTICAL ROAD"],
  "MULTI-PURPOSE BUILDING": ["2ND VERTICAL ROAD","SECOND HORIZONTAL ROAD"],
  "AUTOMOTIVE BUILDING": ["3RD VERTICAL ROAD"],
  "CIVIL TECH BUILDING": ["3RD VERTICAL ROAD"],
  "ACADEMIC BUILDING": ["4TH VERTICAL ROAD"],
  "TECH BUILDING": ["5TH VERTICAL ROAD"],
  "IT BUILDING": ["6TH VERTICAL ROAD"],
  "MECHANICAL BUILDING": ["7TH VERTICAL ROAD"],
  "WAF & RAC BUILDING": ["8TH VERTICAL ROAD"],
  "SCIENCE BUILDING": ["8TH VERTICAL ROAD"],
  "TE BUILDING": ["8TH VERTICAL ROAD"],
  "POWER ROOM": ["8TH VERTICAL ROAD"],
  "GRADUATE SCHOOL BUILDING": ["8TH VERTICAL ROAD"],
  "MIST-NCESTD BUILDING": ["SECOND HORIZONTAL ROAD"]
};

function bfs(start, end) {
  var q = [[start]], seen = {};
  seen[start] = true;
  while (q.length) {
    var path = q.shift();
    var node = path[path.length - 1];
    if (node === end) return path;
    var neighbors = edges[node] || [];
    for (var i = 0; i < neighbors.length; i++) {
      var n = neighbors[i];
      if (!seen[n]) { seen[n] = true; q.push(path.concat(n)); }
    }
  }
  return null;
}

function titleCase(s) {
  return s.split(" ").filter(function(w){ return w.length > 0; }).map(function(w){
    return w[0].toUpperCase() + w.slice(1).toLowerCase();
  }).join(" ");
}

var CUSTOM_DIRECTIONS = {
  "ACADEMIC BUILDING": [
    "Exit through the main gate.",
    "Walk straight along the main road.",
    "Turn left at the 4th intersection.",
    "The Academic Building is ahead on your right.",
    "Enter through the main building entrance."
  ],
  "NEW ADMIN BUILDING": [
    "Exit through the main gate.",
    "Turn left immediately after the gate.",
    "The New Admin Building is on your right."
  ],
  "OLD ADMIN BUILDING": [
    "Exit through the main gate.",
    "Turn left immediately after the gate.",
    "Walk past the New Admin Building.",
    "The Old Admin Building is on your left."
  ]
};

var ul = document.getElementById("steps");

if (!DEST) {
  var errEl = document.getElementById("error-msg");
  errEl.textContent = "No destination specified.";
  errEl.style.display = "block";
} else {
  var steps = CUSTOM_DIRECTIONS[DEST];
  if (!steps) {
    var path = bfs("GATE", DEST);
    if (path && path.length > 1) {
      steps = path.slice(1, -1).map(function(n) { return "Head toward " + titleCase(n); });
    } else {
      steps = ["Walk straight from the main entrance toward " + titleCase(DEST)];
    }
  }

  for (var i = 0; i < steps.length; i++) {
    var li  = document.createElement("li");
    var num = document.createElement("span");
    num.className = "num";
    num.textContent = i + 1;
    var txt = document.createElement("span");
    txt.textContent = steps[i];
    li.appendChild(num);
    li.appendChild(txt);
    ul.appendChild(li);
  }

  var arrive = document.getElementById("arrive-msg");
  arrive.textContent = "You have arrived at " + titleCase(DEST);
  arrive.style.display = "block";
}
</script>
</body>
</html>
