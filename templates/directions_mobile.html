<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directions</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
body { background: #7b2d2d; color: #fff; min-height: 100vh; padding: 36px 24px; }
.label { font-size: 13px; letter-spacing: 3px; opacity: .65; margin-bottom: 6px; }
.dest  { font-size: 28px; font-weight: 900; margin-bottom: 8px; line-height: 1.2; }
.sub   { font-size: 13px; opacity: .6; margin-bottom: 28px; }
ul { list-style: none; padding: 0; }
li {
  display: flex; align-items: flex-start; gap: 14px;
  font-size: 17px; line-height: 1.5; margin-bottom: 18px;
}
.num {
  min-width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.arrive {
  margin-top: 24px; padding: 16px; border-radius: 12px;
  background: rgba(255,255,255,0.15); font-size: 17px; font-weight: 700;
}
.error {
  margin-top: 24px; padding: 16px; border-radius: 12px;
  background: rgba(0,0,0,0.2); font-size: 15px; opacity: .8;
}
</style>
</head>
<body>
<div class="label">DESTINATION</div>
<div class="dest" id="dest-name"></div>
<div class="sub">Directions from the main entrance</div>
<ul id="steps"></ul>
<div class="arrive" id="arrive-msg" style="display:none"></div>
<div class="error"  id="error-msg"  style="display:none"></div>

<script>
var DEST = (new URLSearchParams(window.location.search).get("location") || "").trim().toUpperCase();

var destEl = document.getElementById("dest-name");
destEl.textContent = DEST ? titleCase(DEST) : "Unknown";

var edges = {
  "GATE": ["LAST HORIZONTAL ROAD"],
  "LAST HORIZONTAL ROAD": ["GATE","MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","FSM BUILDING"],
  "MAIN HORIZONTAL ROAD": ["LAST HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","1ST VERTICAL ROAD","2ND VERTICAL ROAD","3RD VERTICAL ROAD","4TH VERTICAL ROAD","5TH VERTICAL ROAD","6TH VERTICAL ROAD","7TH VERTICAL ROAD","8TH VERTICAL ROAD"],
  "SECOND HORIZONTAL ROAD": ["MAIN HORIZONTAL ROAD","MULTI-PURPOSE BUILDING","MIST-NCESTD BUILDING"],
  "1ST VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","OLD ADMIN BUILDING"],
  "2ND VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","MIST-NCESTD DORM","RODRIGUEZ BUILDING","MULTI-PURPOSE BUILDING","YLAGAN HALL"],
  "3RD VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","AUTOMOTIVE BUILDING","CIVIL TECH BUILDING"],
  "4TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","ACADEMIC BUILDING"],
  "5TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","TECH BUILDING"],
  "6TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","IT BUILDING"],
  "7TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","MECHANICAL BUILDING"],
  "8TH VERTICAL ROAD": ["MAIN HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","WAF & RAC BUILDING","SCIENCE BUILDING","TE BUILDING","POWER ROOM","GRADUATE SCHOOL BUILDING"],
  "NEW ADMIN BUILDING": ["1ST VERTICAL ROAD","LAST HORIZONTAL ROAD"],
  "OLD ADMIN BUILDING": ["1ST VERTICAL ROAD"],
  "FSM BUILDING": ["LAST HORIZONTAL ROAD"],
  "YLAGAN HALL": ["2ND VERTICAL ROAD"],
  "RODRIGUEZ BUILDING": ["2ND VERTICAL ROAD"],
  "MIST-NCESTD DORM": ["2ND VERTICAL ROAD"],
  "MULTI-PURPOSE BUILDING": ["2ND VERTICAL ROAD","SECOND HORIZONTAL ROAD"],
  "AUTOMOTIVE BUILDING": ["3RD VERTICAL ROAD"],
  "CIVIL TECH BUILDING": ["3RD VERTICAL ROAD"],
  "ACADEMIC BUILDING": ["4TH VERTICAL ROAD"],
  "TECH BUILDING": ["5TH VERTICAL ROAD"],
  "IT BUILDING": ["6TH VERTICAL ROAD"],
  "MECHANICAL BUILDING": ["7TH VERTICAL ROAD"],
  "WAF & RAC BUILDING": ["8TH VERTICAL ROAD"],
  "SCIENCE BUILDING": ["8TH VERTICAL ROAD"],
  "TE BUILDING": ["8TH VERTICAL ROAD"],
  "POWER ROOM": ["8TH VERTICAL ROAD"],
  "GRADUATE SCHOOL BUILDING": ["8TH VERTICAL ROAD"],
  "MIST-NCESTD BUILDING": ["SECOND HORIZONTAL ROAD"]
};

function bfs(start, end) {
  var q = [[start]], seen = {};
  seen[start] = true;
  while (q.length) {
    var path = q.shift();
    var node = path[path.length - 1];
    if (node === end) return path;
    var neighbors = edges[node] || [];
    for (var i = 0; i < neighbors.length; i++) {
      var n = neighbors[i];
      if (!seen[n]) { seen[n] = true; q.push(path.concat(n)); }
    }
  }
  return null;
}

function titleCase(s) {
  return s.split(" ").filter(function(w){ return w.length > 0; }).map(function(w){
    return w[0].toUpperCase() + w.slice(1).toLowerCase();
  }).join(" ");
}

var ul = document.getElementById("steps");

if (!DEST) {
  var errEl = document.getElementById("error-msg");
  errEl.textContent = "No destination specified.";
  errEl.style.display = "block";
} else {
  var path = bfs("GATE", DEST);
  if (path && path.length > 1) {
    var middle = path.slice(1, -1);
    for (var i = 0; i < middle.length; i++) {
      var li  = document.createElement("li");
      var num = document.createElement("span");
      num.className = "num";
      num.textContent = i + 1;
      var txt = document.createElement("span");
      txt.textContent = "Head toward " + titleCase(middle[i]);
      li.appendChild(num);
      li.appendChild(txt);
      ul.appendChild(li);
    }
    var arrive = document.getElementById("arrive-msg");
    arrive.textContent = "You have arrived at " + titleCase(DEST);
    arrive.style.display = "block";
  } else {
    var li  = document.createElement("li");
    var num = document.createElement("span");
    num.className = "num";
    num.textContent = "1";
    var txt = document.createElement("span");
    txt.textContent = "Walk straight from the main entrance toward " + titleCase(DEST);
    li.appendChild(num);
    li.appendChild(txt);
    ul.appendChild(li);
  }
}
</script>
</body>
</html>
