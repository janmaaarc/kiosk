<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Directions</title>
<style>
:root {
  --red: #7b2d2d;
  --red-dk: #5a1f1f;
  --f: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#1a0a0a; overflow:hidden; font-family:var(--f); }

/* ── WRAP: landscape = row, portrait = column ── */
.wrap {
  position:fixed; inset:0;
  display:flex; flex-direction:row; overflow:hidden;
}

/* ── LEFT PANEL (directions + campus thumb) ── */
.panel {
  width:30%; flex-shrink:0; height:100%;
  background:linear-gradient(175deg, var(--red) 0%, var(--red-dk) 100%);
  color:#fff;
  display:flex; flex-direction:column; overflow:hidden;
  padding:16px 12px 12px;
  gap:8px;
}
.p-eyebrow { font-size:9px; font-weight:900; letter-spacing:3px; color:rgba(255,255,255,.4); }
.p-name    { font-size:clamp(13px,2.8vw,20px); font-weight:900; line-height:1.2; }
.p-divider { height:1px; background:rgba(255,255,255,.15); flex-shrink:0; }
.p-dir-hd  { font-size:9px; font-weight:900; letter-spacing:3px; color:rgba(255,255,255,.5); }
.panel ul  { list-style:disc; padding-left:14px; flex:1; overflow-y:auto; }
.panel ul li { font-size:clamp(10px,1.8vw,13px); line-height:1.6; color:rgba(255,255,255,.88); margin-bottom:2px; }

/* Campus map thumbnail */
.campus-thumb {
  flex-shrink:0;
  border-radius:6px; overflow:hidden;
  border:1px solid rgba(255,255,255,.2);
  background:#2a1010; cursor:pointer; position:relative;
}
.campus-thumb img { width:100%; display:block; object-fit:cover; max-height:100px; }
.campus-thumb-hint {
  position:absolute; bottom:4px; right:5px;
  font-size:8px; font-weight:900; letter-spacing:1px;
  color:rgba(255,255,255,.7); background:rgba(0,0,0,.45);
  padding:2px 5px; border-radius:3px; pointer-events:none;
}

/* Campus map zoom overlay */
#map-zoom {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.92);
  flex-direction:column; align-items:center; justify-content:center;
}
#map-zoom.show { display:flex; }
#map-zoom-inner {
  position:relative; width:92vw; max-width:600px;
  border-radius:8px; overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#map-zoom-inner img { width:100%; display:block; }
#map-zoom-close {
  position:absolute; top:8px; right:8px;
  width:30px; height:30px; border-radius:50%;
  background:rgba(123,45,45,.9); color:#fff;
  font-size:18px; font-weight:900; line-height:30px; text-align:center;
  cursor:pointer; border:none; font-family:var(--f);
}

/* ── RIGHT PANEL (floor plan) ── */
.floor-panel {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
  background:#f5f0ea;
}

.floor-panel-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px 6px;
  background:#fff;
  border-bottom:1px solid #e8e0d8;
  flex-shrink:0;
}
.fp-title { font-size:9px; font-weight:900; letter-spacing:3px; color:var(--red); }
#floor-tabs { display:flex; gap:4px; overflow-x:auto; flex-shrink:0; }
.floor-btn {
  padding:4px 10px; border:none; border-radius:10px;
  background:rgba(123,45,45,.1); color:var(--red);
  font-family:var(--f); font-size:11px; font-weight:900; letter-spacing:1px;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.floor-btn.active { background:var(--red); color:#fff; }

/* Plan container */
.plan-container {
  flex:1; overflow:auto;
  display:flex; align-items:flex-start; justify-content:center;
  padding:8px;
}
#plan-wrap {
  display:none; position:relative;
  width:100%; aspect-ratio:1200/700; flex-shrink:0;
  border-radius:6px; overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
}
#floor-img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:fill; display:block;
}
#room-overlays { position:absolute; inset:0; pointer-events:auto; }
#route-svg {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; display:none;
}
#no-floor {
  display:none; flex-direction:column; align-items:center;
  justify-content:center; gap:6px; color:#bbb; text-align:center;
  width:100%; padding:40px 0;
}

/* Room labels */
.room-lbl {
  position:absolute; display:flex; align-items:center; justify-content:center;
  text-align:center; font-family:var(--f);
  font-size:clamp(6px,1.2vw,9px); font-weight:800; line-height:1.1;
  color:#1a1a1a; background:transparent;
  border:1px solid transparent; border-radius:3px;
  padding:1px 2px; cursor:pointer; text-transform:uppercase;
  letter-spacing:0.3px; transition:background 0.15s, color 0.15s;
}
.room-lbl:hover, .room-lbl.active {
  background:rgba(139,46,46,0.85); border-color:#fff; color:#fff;
}

/* ── PORTRAIT: stack vertically ── */
@media (orientation: portrait) {
  .wrap { flex-direction:column; }
  .panel {
    width:100%; height:auto; flex-shrink:0;
    padding:12px 14px 10px;
    max-height:42%;
  }
  .panel ul { flex:1; }
  .campus-thumb { display:none; }
  .p-name { font-size:clamp(14px,4.5vw,20px); }
  .panel ul li { font-size:clamp(11px,3vw,14px); }
  .floor-panel { flex:1; min-height:0; }
}

/* ── LANDSCAPE phones: tighten up ── */
@media (orientation: landscape) and (max-height: 500px) {
  .panel { padding:10px 10px 8px; gap:5px; }
  .p-name { font-size:clamp(11px,2vw,15px); }
  .panel ul li { font-size:clamp(9px,1.6vw,12px); }
  .campus-thumb img { max-height:70px; }
  .floor-panel-hd { padding:5px 8px 4px; }
  .plan-container { padding:4px; }
}

/* ── Landscape prompt ── */
#landscape-prompt {
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(10,0,0,.92);
  flex-direction:column; align-items:center; justify-content:center;
  gap:18px; padding:32px; text-align:center; color:#fff;
}
#landscape-prompt.show { display:flex; }
.lp-phone { color:var(--red); animation:lp-rock 1.4s ease-in-out infinite alternate; }
@keyframes lp-rock { from { transform:rotate(-20deg); } to { transform:rotate(20deg); } }
.lp-title { font-size:clamp(16px,5vw,24px); font-weight:900; letter-spacing:3px; color:var(--red); }
.lp-desc  { font-size:clamp(12px,3.5vw,15px); opacity:.75; max-width:280px; line-height:1.6; letter-spacing:.5px; }
.lp-skip  { font-size:clamp(10px,3vw,13px); opacity:.4; cursor:pointer; text-decoration:underline; padding:8px 16px; letter-spacing:1px; }
</style>
</head>
<body>

<div id="landscape-prompt">
  <div class="lp-phone">
    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="2" width="10" height="20" rx="2"/>
      <circle cx="12" cy="17" r=".8" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <div class="lp-title">ROTATE YOUR PHONE</div>
  <div class="lp-desc">Turn to landscape for the best floor plan viewing experience.</div>
  <div class="lp-skip" onclick="dismissLandscapePrompt()">Continue in portrait</div>
</div>

<div class="wrap">

  <!-- LEFT / TOP: Directions -->
  <div class="panel">
    <div class="p-eyebrow">DESTINATION</div>
    <div class="p-name" id="dest-name"></div>
    <div class="p-divider"></div>
    <div class="p-dir-hd">DIRECTIONS</div>
    <ul id="steps"></ul>
    <div class="campus-thumb" onclick="openMapZoom()">
      <img src="/static/images/labeled_map.jpg" alt="Campus Map" onerror="this.parentElement.style.display='none'">
      <div class="campus-thumb-hint">TAP TO ZOOM</div>
    </div>
  </div>

  <!-- RIGHT / BOTTOM: Floor plan -->
  <div class="floor-panel">
    <div class="floor-panel-hd">
      <div class="fp-title">BUILDING FLOOR PLAN</div>
      <div id="floor-tabs"></div>
    </div>
    <div class="plan-container">
      <div id="plan-wrap">
        <img id="floor-img" src="" alt="Floor Plan">
        <div id="room-overlays"></div>
        <svg id="route-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path id="route-path" fill="none" stroke="#8e44ad" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div id="no-floor">
        <div style="font-size:13px;font-weight:900;letter-spacing:2px;color:#bbb;">FLOOR PLAN</div>
        <div style="font-size:11px;letter-spacing:1px;color:#ccc;">Not available</div>
      </div>
    </div>
  </div>

</div>

<!-- Campus map zoom overlay -->
<div id="map-zoom">
  <div id="map-zoom-inner">
    <img src="/static/images/labeled_map.jpg" alt="Campus Map">
    <button id="map-zoom-close" onclick="closeMapZoom()" aria-label="Close">&times;</button>
  </div>
</div>

<script>
var p    = new URLSearchParams(window.location.search);
var DEST = (p.get("location") || "").trim().toUpperCase();
var IMG  = p.get("img") || "";

// Orientation prompt
var _landscapeDismissed = false;
function checkOrientation() {
  var isPortrait = window.innerWidth < window.innerHeight;
  var el = document.getElementById('landscape-prompt');
  if (!_landscapeDismissed && isPortrait) { el.classList.add('show'); }
  else { el.classList.remove('show'); }
}
function dismissLandscapePrompt() {
  _landscapeDismissed = true;
  document.getElementById('landscape-prompt').classList.remove('show');
}
window.addEventListener('resize', checkOrientation);
checkOrientation();

function openMapZoom() {
  document.getElementById('map-zoom').classList.add('show');
}
function closeMapZoom() {
  document.getElementById('map-zoom').classList.remove('show');
}
document.addEventListener('click', function(e) {
  var z = document.getElementById('map-zoom');
  if (z.classList.contains('show') && e.target === z) closeMapZoom();
});

function tc(s) {
  return s.split(" ").filter(function(w){return w.length>0;}).map(function(w){
    return w[0].toUpperCase()+w.slice(1).toLowerCase();
  }).join(" ");
}

var name = DEST ? tc(DEST) : "Unknown";
document.getElementById("dest-name").textContent = name;

var CUSTOM = {
  "ACADEMIC BUILDING":["You are currently here.","Walk straight ahead.","At the intersection, turn left.","The Academic Building is on your right.","Enter through the main entrance."],
  "NEW ADMIN BUILDING":["Exit through the main gate.","Turn left immediately after the gate.","The New Admin Building is on your right."],
  "OLD ADMIN BUILDING":["Exit through the main gate.","Turn left after the gate.","Walk past the New Admin Building.","The Old Admin Building is on your left."]
};
var EDGES = {
  "GATE":["LAST HORIZONTAL ROAD"],
  "LAST HORIZONTAL ROAD":["GATE","MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","FSM BUILDING"],
  "MAIN HORIZONTAL ROAD":["LAST HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","1ST VERTICAL ROAD","2ND VERTICAL ROAD","3RD VERTICAL ROAD","4TH VERTICAL ROAD","5TH VERTICAL ROAD","6TH VERTICAL ROAD","7TH VERTICAL ROAD","8TH VERTICAL ROAD"],
  "4TH VERTICAL ROAD":["MAIN HORIZONTAL ROAD","ACADEMIC BUILDING"],
  "ACADEMIC BUILDING":["4TH VERTICAL ROAD"],
  "1ST VERTICAL ROAD":["MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","OLD ADMIN BUILDING"],
  "NEW ADMIN BUILDING":["1ST VERTICAL ROAD","LAST HORIZONTAL ROAD"],
  "OLD ADMIN BUILDING":["1ST VERTICAL ROAD"]
};
function bfs(s,e){var q=[[s]],seen={};seen[s]=true;while(q.length){var path=q.shift(),node=path[path.length-1];if(node===e)return path;var nb=EDGES[node]||[];for(var i=0;i<nb.length;i++){if(!seen[nb[i]]){seen[nb[i]]=true;q.push(path.concat(nb[i]));}}}return null;}

var steps = DEST ? (CUSTOM[DEST]||(function(){var path=bfs("GATE",DEST);return(path&&path.length>1)?path.slice(1,-1).map(function(n){return"Head toward "+tc(n);}):["Walk straight from the main entrance toward "+tc(DEST)];})()):[];
var ul = document.getElementById("steps");
for (var i=0;i<steps.length;i++){var li=document.createElement("li");li.textContent=steps[i];ul.appendChild(li);}

// ── Floor plan from DB ─────────────────────────────────
function toTitleCase(s) {
  return s.split(' ').map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(' ');
}
var _BLDG_ALIASES = {
  "INDUSTRIAL TECHNOLOGY BUILDING": "IT Building",
};
var DEST_TITLE = _BLDG_ALIASES[DEST] || toTitleCase(DEST);

var _dbFloors = null;

fetch('/api/building-floors?building=' + encodeURIComponent(DEST_TITLE))
  .then(function(r){ return r.json(); })
  .then(function(data) {
    _dbFloors = data;
    if (data.length) { buildFloorTabs(); }
    else { document.getElementById('no-floor').style.display = 'flex'; }
  })
  .catch(function(){
    document.getElementById('no-floor').style.display = 'flex';
  });

function buildFloorTabs() {
  var floors = _dbFloors;
  var tabsEl = document.getElementById("floor-tabs");
  for (var i = 0; i < floors.length; i++) {
    (function(idx) {
      var btn = document.createElement("button");
      btn.className = "floor-btn" + (idx === 0 ? " active" : "");
      btn.textContent = floors[idx].floor_label || ("Floor " + floors[idx].floor_number);
      btn.onclick = function() { showFloor(idx); };
      tabsEl.appendChild(btn);
    })(i);
  }
  showFloor(0);
}

var _currentEntrance = {x:50, y:96, hY:50};
var _floorGraph = null;

function dijkstraFloor(nodes, adj, start, goal) {
  if (start === goal) return [start];
  var byId = {};
  nodes.forEach(function(n){ byId[n.id] = n; });
  var dist = {}, prev = {}, unvisited = {};
  nodes.forEach(function(n){ dist[n.id] = Infinity; unvisited[n.id] = true; });
  dist[start] = 0;
  while (true) {
    var cur = null;
    Object.keys(unvisited).forEach(function(id){
      if (cur === null || dist[id] < dist[cur]) cur = id;
    });
    if (cur === null || dist[cur] === Infinity) return null;
    cur = parseInt(cur, 10);
    if (cur === goal) {
      var path = [];
      while (cur !== undefined) { path.unshift(cur); cur = prev[cur]; }
      return path;
    }
    delete unvisited[cur];
    var cn = byId[cur];
    (adj[cur] || []).forEach(function(nb){
      if (!unvisited[nb]) return;
      var nn = byId[nb];
      var dx = cn.x_pct - nn.x_pct, dy = cn.y_pct - nn.y_pct;
      var w = Math.sqrt(dx*dx + dy*dy);
      var d = dist[cur] + w;
      if (d < dist[nb]) { dist[nb] = d; prev[nb] = cur; }
    });
  }
}

function showFloor(idx) {
  var floors = _dbFloors;
  if (!floors || !floors[idx] || !floors[idx].floor_image_url) return;

  document.getElementById("floor-img").src = floors[idx].floor_image_url;
  document.getElementById("plan-wrap").style.display = "block";
  document.getElementById("no-floor").style.display = "none";

  var overlays = document.getElementById("room-overlays");
  while (overlays.firstChild) overlays.removeChild(overlays.firstChild);
  document.getElementById("route-path").setAttribute("d", "");
  document.getElementById("route-svg").style.display = "none";

  var btns = document.querySelectorAll(".floor-btn");
  for (var j = 0; j < btns.length; j++) {
    btns[j].className = "floor-btn" + (j === idx ? " active" : "");
  }

  _floorGraph = null;
  var floorNum = floors[idx].floor_number;

  fetch('/api/floor-paths?building=' + encodeURIComponent(DEST_TITLE) + '&floor=' + floorNum)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.nodes || !data.nodes.length) return;
      var adj = {};
      data.nodes.forEach(function(n){ adj[n.id]=[]; });
      data.edges.forEach(function(e){ adj[e.from_id].push(e.to_id); adj[e.to_id].push(e.from_id); });
      _floorGraph = { nodes: data.nodes, adj: adj };
    })
    .catch(function(){});

  fetch("/api/floor_rooms?building=" + encodeURIComponent(DEST_TITLE) + "&floor=" + floorNum)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      _currentEntrance = data.entrance || {x:50, y:96, hY:50};
      renderRooms(data.rooms || []);
    })
    .catch(function(){});
}

function renderRooms(rooms) {
  var overlays = document.getElementById("room-overlays");
  for (var i = 0; i < rooms.length; i++) {
    (function(room) {
      var div = document.createElement("div");
      div.className = "room-lbl";
      div.style.left   = room.left + "%";
      div.style.top    = room.top  + "%";
      div.style.width  = room.width  + "%";
      div.style.height = room.height + "%";
      div.textContent  = room.name;
      div.onclick = function() { selectRoom(div, room); };
      overlays.appendChild(div);
    })(rooms[i]);
  }
}

function selectRoom(el, room) {
  var all = document.querySelectorAll(".room-lbl");
  for (var i = 0; i < all.length; i++) all[i].classList.remove("active");
  el.classList.add("active");

  var rCx = room.left + room.width  / 2;
  var rCy = room.top  + room.height / 2;
  var d;

  if (_floorGraph && _floorGraph.nodes.length > 1) {
    var nodes = _floorGraph.nodes, adj = _floorGraph.adj;
    var entry = nodes.find(function(n){ return /ENTRANCE|GATE|ENTRY/i.test(n.label||''); }) || nodes[0];
    var best = null, bestDist = Infinity;
    nodes.forEach(function(n){ var dx=n.x_pct-rCx, dy=n.y_pct-rCy, d2=dx*dx+dy*dy; if(d2<bestDist){bestDist=d2;best=n;} });
    if (entry && best) {
      var path = dijkstraFloor(nodes, adj, entry.id, best.id);
      if (path && path.length > 1) {
        var byId = {};
        nodes.forEach(function(n){ byId[n.id]=n; });
        var parts = [];
        path.forEach(function(id, i){
          var n = byId[id];
          if (!n) return;
          parts.push((i===0?'M ':'L ') + n.x_pct + ' ' + n.y_pct);
        });
        parts.push('L ' + rCx + ' ' + rCy);
        d = parts.join(' ');
      }
    }
  }

  if (!d) {
    var e = _currentEntrance;
    d = "M " + e.x + " " + e.y +
        " L " + e.x + " " + e.hY +
        " L " + rCx + " " + e.hY +
        " L " + rCx + " " + rCy;
  }

  document.getElementById("route-path").setAttribute("d", d);
  document.getElementById("route-svg").style.display = "block";
}
</script>

</body>
</html>
