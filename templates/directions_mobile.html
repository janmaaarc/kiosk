<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Directions</title>
<style>
:root {
  --red: #7b2d2d;
  --red-dk: #5a1f1f;
  --f: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; margin:0; background:#1a0a0a; overflow:hidden; font-family:var(--f); }
.wrap {
  position:fixed; top:0; left:0; right:0; bottom:0;
  display:flex; overflow:hidden;
}

/* ── LEFT PANEL ── */
.panel {
  width:27%; flex-shrink:0;
  height:100%;
  background:linear-gradient(175deg, var(--red) 0%, var(--red-dk) 100%);
  color:#fff;
  padding:40px 11px 18px;
  display:flex; flex-direction:column; overflow:hidden;
}
.p-hdr  { font-size:clamp(5px,1.6vw,10px); font-weight:900; letter-spacing:3px; color:rgba(255,255,255,.4); margin-bottom:8px; }
.p-lbl  { font-size:clamp(5px,1.4vw,8px);  letter-spacing:2px; color:rgba(255,255,255,.55); margin-bottom:2px; }
.p-name { font-size:clamp(8px,2.4vw,14px); font-weight:900; letter-spacing:.5px; line-height:1.2; margin-bottom:14px; }
.p-dhd  { font-size:clamp(7px,2vw,12px); font-weight:900; letter-spacing:1px; margin-bottom:8px; }
.panel ul { list-style:disc; padding-left:13px; flex:1; }
.panel ul li { font-size:clamp(5.5px,1.6vw,9.5px); line-height:1.6; margin-bottom:3px; color:rgba(255,255,255,.88); }
.p-inside { font-size:clamp(7px,2vw,12px); font-weight:900; letter-spacing:1px; margin-top:12px; color:rgba(255,255,255,.9); }

/* ── RIGHT ── */
.right { flex:1; display:flex; flex-direction:column; overflow:hidden; height:100%; }

/* Map section */
.map-sect { flex:1; position:relative; overflow:hidden; background:#ede5d8; }
.map-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.28; }

.map-badge {
  position:absolute; top:6px; right:6px;
  background:rgba(123,45,45,.95); color:#fff;
  font-size:clamp(4px,1.1vw,7px); font-weight:900; letter-spacing:1.5px;
  padding:3px 6px; border-radius:4px; z-index:20;
}
.map-toggle {
  position:absolute; top:23px; right:6px;
  display:flex; border-radius:6px; overflow:hidden;
  font-size:clamp(4px,1.1vw,7px); font-weight:900; letter-spacing:1px;
  z-index:20;
}
.map-toggle span { padding:3px 6px; background:rgba(255,255,255,.92); color:#888; cursor:pointer; }
.map-toggle span.on { background:var(--red); color:#fff; }
.floor-btn {
  padding:3px 8px; border:none; border-radius:10px;
  background:rgba(123,45,45,.12); color:var(--red);
  font-family:var(--f); font-size:clamp(7px,2vw,11px);
  font-weight:900; letter-spacing:1px; cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.floor-btn.active { background:var(--red); color:#fff; }
.room-lbl {
  position:absolute;
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  font-family:var(--f);
  font-size:clamp(4px,1vw,7px);
  font-weight:800;
  line-height:1.1;
  color:#1a1a1a;
  background:transparent;
  border:1px solid transparent;
  border-radius:3px;
  padding:1px 2px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.3px;
  transition:background 0.15s, color 0.15s;
}
.room-lbl:hover, .room-lbl.active {
  background:rgba(139,46,46,0.85);
  border-color:#fff;
  color:#fff;
}

/* Centered white card */
.map-card {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center; padding:8px;
}
.card-inner {
  background:rgba(255,255,255,.97);
  border-radius:10px;
  box-shadow:0 6px 28px rgba(0,0,0,.22);
  padding:8px 8px 6px; width:100%; max-width:360px;
}
.card-title { font-size:clamp(7px,2vw,12px); font-weight:900; letter-spacing:3px; color:var(--red); margin-bottom:1px; }
.card-dest  { font-size:clamp(5px,1.4vw,9px); font-weight:700; letter-spacing:1.5px; color:#666; margin-bottom:6px; }

/* Campus map replica — same layout as campus.html, scaled via viewBox */
.mini-map { width:100%; border-radius:6px; overflow:hidden; background:#f0ebe3; }
.mini-map svg { display:block; width:100%; height:auto; }

/* Photo */
.photo-sect { height:40%; flex-shrink:0; overflow:hidden; background:#c8b8a0; }
.photo-sect img { width:100%; height:100%; object-fit:cover; display:block; }

/* Landscape prompt */
#landscape-prompt {
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(10,0,0,.92);
  flex-direction:column; align-items:center; justify-content:center;
  gap:18px; padding:32px; text-align:center; color:#fff;
}
#landscape-prompt.show { display:flex; }
.lp-phone {
  color:var(--red);
  animation:lp-rock 1.4s ease-in-out infinite alternate;
}
@keyframes lp-rock {
  from { transform:rotate(-20deg); }
  to   { transform:rotate(20deg); }
}
.lp-title { font-size:clamp(16px,5vw,24px); font-weight:900; letter-spacing:3px; color:var(--red); }
.lp-desc  { font-size:clamp(12px,3.5vw,15px); opacity:.75; max-width:280px; line-height:1.6; letter-spacing:.5px; }
.lp-skip  { font-size:clamp(10px,3vw,13px); opacity:.4; cursor:pointer; text-decoration:underline; padding:8px 16px; letter-spacing:1px; }
</style>
</head>
<body>
<div id="landscape-prompt">
  <div class="lp-phone">
    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="2" width="10" height="20" rx="2"/>
      <circle cx="12" cy="17" r=".8" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <div class="lp-title">ROTATE YOUR PHONE</div>
  <div class="lp-desc">Turn to landscape for the best floor plan viewing experience.</div>
  <div class="lp-skip" onclick="dismissLandscapePrompt()">Continue in portrait</div>
</div>

<div class="wrap">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="p-hdr">CAMPUS MAP</div>
    <div class="p-lbl">DESTINATION:</div>
    <div class="p-name" id="dest-name"></div>
    <div class="p-dhd">Directions</div>
    <ul id="steps"></ul>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="map-sect">
      <img class="map-bg" src="/static/images/KIOSK BACKGROUND.png" alt="">
      <div class="map-badge">STEP 2: BUILDING LAYOUT</div>
      <div class="map-toggle">
        <span class="on" id="btn-outside" onclick="setView('outside')">OUTSIDE</span>
        <span id="btn-inside" onclick="setView('inside')">INSIDE</span>
      </div>

      <!-- OUTSIDE view: campus map card -->
      <div class="map-card" id="outside-view">
        <div class="card-inner">
          <div class="card-title">CAMPUS MAP</div>
          <div class="card-dest" id="card-dest"></div>
          <div class="mini-map">
            <!-- Campus map — exact building positions from campus.html, viewBox 0 0 1920 1080, scaled by SVG -->
            <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
              <rect width="1920" height="1080" fill="#f0ebe3"/>

              <!-- ROADS (lightgray) -->
              <rect x="150" y="400" width="1500" height="80"  fill="#ccc"/><!-- MAIN HORIZONTAL -->
              <rect x="150" y="140" width="800"  height="35"  fill="#ccc"/><!-- SECOND HORIZONTAL -->
              <rect x="150" y="730" width="1500" height="45"  fill="#ccc"/><!-- LAST HORIZONTAL -->
              <rect x="210" y="480" width="140"  height="340" fill="#ccc"/><!-- 1ST VERTICAL -->
              <rect x="305" y="150" width="40"   height="340" fill="#ccc"/><!-- 2ND VERTICAL -->
              <rect x="565" y="140" width="30"   height="635" fill="#ccc"/><!-- 3RD VERTICAL -->
              <rect x="895" y="140" width="40"   height="600" fill="#ccc"/><!-- 3RD VERTICAL B -->
              <rect x="1190" y="300" width="20"  height="150" fill="#ccc"/><!-- 4TH VERTICAL -->
              <rect x="1345" y="90"  width="30"  height="390" fill="#ccc"/><!-- 5TH VERTICAL -->
              <rect x="1650" y="100" width="50"  height="700" fill="#ccc"/><!-- LAST VERTICAL -->

              <!-- BUILDINGS (yellow) — exact positions from campus.html -->
              <rect data-name="RODRIGUEZ BUILDING"       x="250"  y="90"  w="650"  h="20"  width="650"  height="20"  rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="MIST-NCESTD DORM"         x="965"  y="90"  w="350"  h="130" width="350"  height="130" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="MULTI-PURPOSE BUILDING"   x="1460" y="100" w="170"  h="80"  width="170"  height="80"  rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="YLAGAN HALL"              x="390"  y="220" w="170"  h="100" width="170"  height="100" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="MIST-NCESTD BUILDING"     x="50"   y="180" w="250"  h="185" width="250"  height="185" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="AUTOMOTIVE BUILDING"      x="1460" y="210" w="170"  h="130" width="170"  height="130" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <!-- ACADEMIC BUILDING — highlighted, will be overridden by JS for other destinations -->
              <rect id="bldg-ACADEMIC-BUILDING"
                    data-name="ACADEMIC BUILDING"        x="600"  y="185" w="280"  h="130" width="280"  height="130" rx="8" fill="#ff5722" stroke="#fff" stroke-width="3"/>
              <text x="740" y="258" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="28" font-weight="800" fill="#fff">ACADEMIC BLDG</text>
              <rect data-name="WAF &amp; RAC BUILDING"   x="935"  y="290" w="250"  h="75"  width="250"  height="75"  rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="POWER ROOM"               x="1380" y="340" w="70"   h="35"  width="70"   height="35"  rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect id="bldg-NEW-ADMIN-BUILDING"
                    data-name="NEW ADMIN BUILDING"       x="50"   y="500" w="150"  h="200" width="150"  height="200" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <text x="125" y="604" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="22" font-weight="700" fill="#555">NEW ADMIN</text>
              <rect id="bldg-OLD-ADMIN-BUILDING"
                    data-name="OLD ADMIN BUILDING"       x="355"  y="550" w="80"   h="150" width="80"   height="150" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="FSM BUILDING"             x="600"  y="550" w="200"  h="150" width="200"  height="150" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="CIVIL TECH BUILDING"      x="810"  y="480" w="80"   h="220" width="80"   height="220" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="WAF &amp; FSM BUILDING"   x="680"  y="780" w="600"  h="30"  width="600"  height="30"  rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="TECH BUILDING"            x="1205" y="550" w="410"  h="150" width="410"  height="150" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="GRADUATE SCHOOL BUILDING" x="950"  y="480" w="90"   h="220" width="90"   height="220" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="MECHANICAL BUILDING"      x="1080" y="480" w="105"  h="220" width="105"  height="220" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="IT BUILDING"              x="1720" y="100" w="120"  h="150" width="120"  height="150" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="SCIENCE BUILDING"         x="1720" y="270" w="120"  h="150" width="120"  height="150" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>
              <rect data-name="TE BUILDING"              x="1720" y="445" w="120"  h="340" width="120"  height="340" rx="8" fill="#f4d35e" stroke="rgba(0,0,0,.15)" stroke-width="2"/>

              <!-- YOU ARE HERE pin at gate -->
              <circle cx="150" cy="420" r="22" fill="#8b1a1a"/>
              <text x="150" y="415" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="900" fill="#fff">YOU</text>
              <text x="150" y="432" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="900" fill="#fff">HERE</text>

              <!-- Route line to Academic Building -->
              <polyline id="route-line"
                points="150,420 580,420 580,315 600,315"
                fill="none" stroke="#8e44ad" stroke-width="10"
                stroke-dasharray="20,10" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- INSIDE view: floor plan -->
      <div id="inside-view" style="display:none;position:absolute;top:40px;left:0;right:0;bottom:0;
           background:#fff;flex-direction:column;z-index:5;">
        <div style="padding:5px 8px 2px;background:#fff;flex-shrink:0;
             font-size:clamp(6px,1.8vw,9px);font-weight:900;letter-spacing:3px;color:#7b2d2d;">
          INSIDE THE BUILDING
        </div>
        <div id="floor-tabs" style="display:flex;gap:4px;padding:3px 8px 5px;background:#fff;
             overflow-x:auto;flex-shrink:0;border-bottom:1px solid #eee;"></div>
        <div style="flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:6px;">
          <!-- Floor plan wrapper: locked to SVG aspect ratio 1200:700 so overlays align -->
          <div id="plan-wrap" style="display:none;position:relative;
               width:100%;aspect-ratio:1200/700;flex-shrink:0;border-radius:6px;
               box-shadow:0 2px 10px rgba(0,0,0,.1);overflow:hidden;">
            <img id="floor-img" src="" alt="Floor Plan"
                 style="position:absolute;inset:0;width:100%;height:100%;
                        object-fit:fill;display:block;">
            <!-- Room overlays (positioned as % of plan-wrap) -->
            <div id="room-overlays" style="position:absolute;inset:0;pointer-events:auto;"></div>
            <!-- Static route line SVG -->
            <svg id="route-svg" viewBox="0 0 100 100" preserveAspectRatio="none"
                 style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:none;">
              <path id="route-path" fill="none" stroke="#8e44ad" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div id="no-floor" style="display:none;flex-direction:column;align-items:center;
               justify-content:center;gap:4px;color:#bbb;text-align:center;">
            <div style="font-size:clamp(8px,3vw,13px);font-weight:900;letter-spacing:2px;">FLOOR PLAN</div>
            <div style="font-size:clamp(7px,2.5vw,10px);letter-spacing:1px;">COMING SOON</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Building photo -->
    <div class="photo-sect" id="photo-sect"></div>
  </div>
</div>

<script>
var p    = new URLSearchParams(window.location.search);
var DEST = (p.get("location") || "").trim().toUpperCase();
var IMG  = p.get("img") || "";

// Orientation prompt
var _landscapeDismissed = false;
function checkOrientation() {
  var isPortrait = window.innerWidth < window.innerHeight;
  var el = document.getElementById('landscape-prompt');
  if (!_landscapeDismissed && isPortrait) { el.classList.add('show'); }
  else { el.classList.remove('show'); }
}
function dismissLandscapePrompt() {
  _landscapeDismissed = true;
  document.getElementById('landscape-prompt').classList.remove('show');
}
window.addEventListener('resize', checkOrientation);
checkOrientation();

function tc(s) {
  return s.split(" ").filter(function(w){return w.length>0;}).map(function(w){
    return w[0].toUpperCase()+w.slice(1).toLowerCase();
  }).join(" ");
}

var name = DEST ? tc(DEST) : "Unknown";
document.getElementById("dest-name").textContent  = name;
document.getElementById("card-dest").textContent   = "DESTINATION: " + DEST;

// Highlight correct building in SVG
var BUILDING_IDS = {
  "ACADEMIC BUILDING":  "bldg-ACADEMIC-BUILDING",
  "NEW ADMIN BUILDING": "bldg-NEW-ADMIN-BUILDING",
  "OLD ADMIN BUILDING": "bldg-OLD-ADMIN-BUILDING"
};
// Reset Academic to yellow if destination is different
if (DEST && DEST !== "ACADEMIC BUILDING") {
  var acad = document.getElementById("bldg-ACADEMIC-BUILDING");
  if (acad) { acad.setAttribute("fill","#f4d35e"); acad.setAttribute("stroke","rgba(0,0,0,.15)"); acad.setAttribute("stroke-width","2"); }
  var targetId = BUILDING_IDS[DEST];
  if (targetId) {
    var el = document.getElementById(targetId);
    if (el) { el.setAttribute("fill","#ff5722"); el.setAttribute("stroke","#fff"); el.setAttribute("stroke-width","3"); }
  }
}

if (IMG && IMG.startsWith("/static/")) {
  var img = document.createElement("img");
  img.src = IMG; img.alt = name;
  document.getElementById("photo-sect").appendChild(img);
}

var CUSTOM = {
  "ACADEMIC BUILDING":["You are currently here.","Walk straight ahead.","At the intersection, turn left.","The Academic Building is on your right.","Enter through the main entrance."],
  "NEW ADMIN BUILDING":["Exit through the main gate.","Turn left immediately after the gate.","The New Admin Building is on your right."],
  "OLD ADMIN BUILDING":["Exit through the main gate.","Turn left after the gate.","Walk past the New Admin Building.","The Old Admin Building is on your left."]
};
var EDGES = {
  "GATE":["LAST HORIZONTAL ROAD"],
  "LAST HORIZONTAL ROAD":["GATE","MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","FSM BUILDING"],
  "MAIN HORIZONTAL ROAD":["LAST HORIZONTAL ROAD","SECOND HORIZONTAL ROAD","1ST VERTICAL ROAD","2ND VERTICAL ROAD","3RD VERTICAL ROAD","4TH VERTICAL ROAD","5TH VERTICAL ROAD","6TH VERTICAL ROAD","7TH VERTICAL ROAD","8TH VERTICAL ROAD"],
  "4TH VERTICAL ROAD":["MAIN HORIZONTAL ROAD","ACADEMIC BUILDING"],
  "ACADEMIC BUILDING":["4TH VERTICAL ROAD"],
  "1ST VERTICAL ROAD":["MAIN HORIZONTAL ROAD","NEW ADMIN BUILDING","OLD ADMIN BUILDING"],
  "NEW ADMIN BUILDING":["1ST VERTICAL ROAD","LAST HORIZONTAL ROAD"],
  "OLD ADMIN BUILDING":["1ST VERTICAL ROAD"]
};
function bfs(s,e){var q=[[s]],seen={};seen[s]=true;while(q.length){var path=q.shift(),node=path[path.length-1];if(node===e)return path;var nb=EDGES[node]||[];for(var i=0;i<nb.length;i++){if(!seen[nb[i]]){seen[nb[i]]=true;q.push(path.concat(nb[i]));}}}return null;}

var steps = DEST ? (CUSTOM[DEST]||(function(){var path=bfs("GATE",DEST);return(path&&path.length>1)?path.slice(1,-1).map(function(n){return"Head toward "+tc(n);}):["Walk straight from the main entrance toward "+tc(DEST)];})()):[];
var ul = document.getElementById("steps");
for (var i=0;i<steps.length;i++){var li=document.createElement("li");li.textContent=steps[i];ul.appendChild(li);}
// "Inside the Building:" only shows when INSIDE view is active

// ── Campus path from DB ─────────────────────────────────
function bfsCampus(adj, start, goal) {
  var q = [[start]], seen = {};
  seen[start] = true;
  while (q.length) {
    var path = q.shift(), node = path[path.length-1];
    if (node === goal) return path;
    (adj[node]||[]).forEach(function(nb){ if (!seen[nb]) { seen[nb]=true; q.push(path.concat(nb)); } });
  }
  return null;
}

fetch('/api/campus-paths').then(function(r){ return r.json(); }).then(function(data) {
  if (!data.nodes.length || !data.edges.length) return;
  var nodeById = {}, adj = {};
  data.nodes.forEach(function(n){ nodeById[n.id]=n; adj[n.id]=[]; });
  data.edges.forEach(function(e){ adj[e.node_a].push(e.node_b); adj[e.node_b].push(e.node_a); });
  var startNode = data.nodes.find(function(n){ return /ENTRANCE|GATE/i.test(n.label); }) || data.nodes[0];
  var destNode  = data.nodes.find(function(n){
    var lbl = n.label.toUpperCase();
    return lbl === DEST || lbl.indexOf(DEST) >= 0 || DEST.indexOf(lbl) >= 0;
  });
  if (!destNode) return;
  var path = bfsCampus(adj, startNode.id, destNode.id);
  if (!path || path.length < 2) return;
  var pts = path.map(function(id){
    var n = nodeById[id];
    return (n.x_pct/100*1920).toFixed(1) + ',' + (n.y_pct/100*1080).toFixed(1);
  }).join(' ');
  var line = document.getElementById('route-line');
  if (line) line.setAttribute('points', pts);
}).catch(function(){});

// ── OUTSIDE / INSIDE toggle ────────────────────────────
function toTitleCase(s) {
  return s.split(' ').map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(' ');
}
var DEST_TITLE = toTitleCase(DEST);

var _dbFloors = null;
var _floorsBuilt = false;

fetch('/api/building-floors?building=' + encodeURIComponent(DEST_TITLE))
  .then(function(r){ return r.json(); })
  .then(function(data) {
    _dbFloors = data;
    var insideBtn = document.getElementById('btn-inside');
    if (!data.length) {
      insideBtn.style.opacity = '.4';
      insideBtn.style.pointerEvents = 'none';
    }
    // If user already tapped Inside before fetch resolved, build tabs now
    var insideEl = document.getElementById('inside-view');
    if (insideEl && insideEl.style.display !== 'none' && !_floorsBuilt) {
      buildFloorTabs();
      _floorsBuilt = true;
    }
  })
  .catch(function(){});

function setView(view) {
  var outsideEl = document.getElementById("outside-view");
  var insideEl  = document.getElementById("inside-view");
  var btnOut    = document.getElementById("btn-outside");
  var btnIn     = document.getElementById("btn-inside");
  if (view === "outside") {
    outsideEl.style.display = "flex";
    insideEl.style.display  = "none";
    btnOut.className = "on";
    btnIn.className  = "";
  } else {
    outsideEl.style.display = "none";
    insideEl.style.display  = "flex";
    btnOut.className = "";
    btnIn.className  = "on";
    if (!_floorsBuilt) { buildFloorTabs(); _floorsBuilt = true; }
  }
}

function buildFloorTabs() {
  var floors = _dbFloors;
  var tabsEl = document.getElementById("floor-tabs");
  var noEl   = document.getElementById("no-floor");

  if (!floors || !floors.length) {
    noEl.style.display = "flex";
    return;
  }

  for (var i = 0; i < floors.length; i++) {
    (function(idx) {
      var btn = document.createElement("button");
      btn.className = "floor-btn" + (idx === 0 ? " active" : "");
      btn.textContent = floors[idx].floor_label || ("Floor " + floors[idx].floor_number);
      btn.onclick = function() { showFloor(idx); };
      tabsEl.appendChild(btn);
    })(i);
  }
  showFloor(0);
}

var _currentEntrance = {x:50, y:96, hY:50};
var _floorGraph = null;

function bfsFloor(adj, start, goal) {
  var q = [[start]], seen = {};
  seen[start] = true;
  while (q.length) {
    var path = q.shift(), node = path[path.length-1];
    if (node === goal) return path;
    (adj[node]||[]).forEach(function(nb){ if (!seen[nb]) { seen[nb]=true; q.push(path.concat(nb)); } });
  }
  return null;
}

function showFloor(idx) {
  var floors = _dbFloors;
  if (!floors || !floors[idx] || !floors[idx].floor_image_url) return;

  var imgEl  = document.getElementById("floor-img");
  var planWrap = document.getElementById("plan-wrap");
  imgEl.src = floors[idx].floor_image_url;
  planWrap.style.display = "block";

  // Clear previous overlays and route
  var overlays = document.getElementById("room-overlays");
  while (overlays.firstChild) overlays.removeChild(overlays.firstChild);
  document.getElementById("route-path").setAttribute("d", "");
  document.getElementById("route-svg").style.display = "none";

  // Highlight active floor button
  var btns = document.querySelectorAll(".floor-btn");
  for (var j = 0; j < btns.length; j++) {
    btns[j].className = "floor-btn" + (j === idx ? " active" : "");
  }

  // Fetch floor path graph for BFS routing
  _floorGraph = null;
  var floorNum = floors[idx].floor_number;
  fetch('/api/floor-paths?building=' + encodeURIComponent(DEST_TITLE) + '&floor=' + floorNum)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.nodes || !data.nodes.length) return;
      var adj = {};
      data.nodes.forEach(function(n){ adj[n.id]=[]; });
      data.edges.forEach(function(e){ adj[e.from_id].push(e.to_id); adj[e.to_id].push(e.from_id); });
      _floorGraph = { nodes: data.nodes, adj: adj };
    })
    .catch(function(){});

  // Fetch room data for this floor
  fetch("/api/floor_rooms?building=" + encodeURIComponent(DEST_TITLE) + "&floor=" + floorNum)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      _currentEntrance = data.entrance || {x:50, y:96, hY:50};
      renderRooms(data.rooms || []);
    })
    .catch(function(){});
}

function renderRooms(rooms) {
  var overlays = document.getElementById("room-overlays");
  for (var i = 0; i < rooms.length; i++) {
    (function(room) {
      var div = document.createElement("div");
      div.className = "room-lbl";
      div.style.left   = room.left + "%";
      div.style.top    = room.top  + "%";
      div.style.width  = room.width  + "%";
      div.style.height = room.height + "%";
      div.textContent  = room.name;
      div.onclick = function() { selectRoom(div, room); };
      overlays.appendChild(div);
    })(rooms[i]);
  }
}

function selectRoom(el, room) {
  var all = document.querySelectorAll(".room-lbl");
  for (var i = 0; i < all.length; i++) all[i].classList.remove("active");
  el.classList.add("active");

  var rCx = room.left + room.width  / 2;
  var rCy = room.top  + room.height / 2;
  var d;

  if (_floorGraph && _floorGraph.nodes.length > 1) {
    var nodes = _floorGraph.nodes, adj = _floorGraph.adj;
    var entry = nodes.find(function(n){ return /ENTRANCE|GATE|ENTRY/i.test(n.label||''); }) || nodes[0];
    var best = null, bestDist = Infinity;
    nodes.forEach(function(n){ var dx=n.x_pct-rCx, dy=n.y_pct-rCy, d2=dx*dx+dy*dy; if(d2<bestDist){bestDist=d2;best=n;} });
    if (entry && best) {
      var path = bfsFloor(adj, entry.id, best.id);
      if (path && path.length > 1) {
        var byId = {};
        nodes.forEach(function(n){ byId[n.id]=n; });
        var parts = [];
        path.forEach(function(id, i){
          var n = byId[id];
          if (!n) return;
          parts.push((i===0?'M ':'L ') + n.x_pct + ' ' + n.y_pct);
        });
        parts.push('L ' + rCx + ' ' + rCy);
        d = parts.join(' ');
      }
    }
  }

  if (!d) {
    var e = _currentEntrance;
    d = "M " + e.x + " " + e.y +
        " L " + e.x + " " + e.hY +
        " L " + rCx + " " + e.hY +
        " L " + rCx + " " + rCy;
  }

  document.getElementById("route-path").setAttribute("d", d);
  document.getElementById("route-svg").style.display = "block";
}
</script>

</body>
