<!DOCTYPE html>
<html>
<head>
<title>Office Selection</title>


<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'League Spartan', sans-serif;
  background:url("{{ url_for('static', filename='images/KIOSK BACKGROUND.png') }}") center/cover no-repeat;
  height:100vh;
  text-align:center;
}

/* NAV ICONS (TOP LEFT) */
.top-icons {
  position: fixed;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 12px;
  z-index: 1000;
}

.top-icon {
  width: 50px;
  height: 50px;
  padding: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.top-icon:hover {
  transform: scale(1.1);
  background: #8b2e2e;
}

/* TOP BAR */
.topbar{
  position:absolute;
  top:20px;
  right:40px;
  display:flex;
  align-items:center;
  gap:10px;
}

.search{
  padding:10px 16px;
  border-radius:20px;
  border:2px solid #e0d0d0;
  width:220px;
  background:#fdf8f8;
  font-family:'League Spartan',sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:1px;
  outline:none;
  transition:border-color 0.2s;
}
.search:focus { border-color:#8b2e2e; }

.icon{
  width:35px;
  height:35px;
  border:2px solid black;
  border-radius:50%;
}

/* TITLE (MATCH MENU) */
.title{
  margin-top:80px;
  font-size:60px;
  font-weight:900;
  color:#8b2e2e;
  text-shadow:2px 2px 0 rgba(0,0,0,0.15);
  letter-spacing:5px;
}

/* GRID */
.grid{
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 columns */
  gap: 30px;
  padding: 0 80px;
}
/* CARD */
.card{
  width: 100%; /* fill grid cell */
  cursor: pointer;
  transition: 0.3s;
}

.card img{
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.card p{
  margin-top:10px;
  font-weight:900;
  font-size:14px;
  letter-spacing:2px;
  color:#333;
}

.card:hover{
  transform:scale(1.05);
}
</style>

</head>

<body>

<div class="top-icons">
  <img src="{{ url_for('static', filename='images/icon/back_button.png') }}" 
       class="top-icon" alt="Back" onclick="goBack()">

  <img src="{{ url_for('static', filename='images/icon/home_button.png') }}" 
       class="top-icon" alt="Home" onclick="goHome()">
</div>
<!-- TOP BAR -->
<div class="topbar">
  <input class="search" id="officeSearch" placeholder="Search office..." oninput="filterCards(this.value)">
  <a href="/admin" class="icon" title="Admin Login" style="display:flex;align-items:center;justify-content:center;text-decoration:none;color:#333;font-size:13px;font-weight:900;letter-spacing:1px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
  </a>
</div>

<!-- TITLE -->
<div class="title">OFFICE INFORMATION</div>

<!-- GRID -->
<div class="grid">

  {% for o in offices %}
    <div class="card" onclick="go('{{ o.key }}')">

      <img src="{{ url_for('static', filename='images/offices/' + o.image) }}">

      <p>{{ o.name }}</p>

    </div>
  {% endfor %}



</div>

<script>
function go(name){
  window.location.href = "/office?name=" + name;
}
function goBack(){
  window.history.back();
}
function goHome(){
  window.location.href = "/";
}
function filterCards(q) {
  const term = q.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const label = card.querySelector('p').textContent.toLowerCase();
    card.style.display = label.includes(term) ? '' : 'none';
  });
}
</script>

</body>
</html>
