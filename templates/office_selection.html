<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Selection</title>


<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'League Spartan', sans-serif;
  background:url("{{ url_for('static', filename='images/KIOSK BACKGROUND.png') }}") center/cover no-repeat;
  height:100vh;
  text-align:center;
}

/* NAV ICONS (TOP LEFT) */
.top-icons {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 12px;
  z-index: 100;
}

.top-icon {
  width: 44px;
  height: 44px;
  cursor: pointer;
  transition: transform 0.2s;
}

.top-icon:hover { transform: scale(1.1); }

/* TOP BAR */
.topbar{
  position:absolute;
  top:20px;
  right:40px;
  display:flex;
  align-items:center;
  gap:15px;
}

.search{
  padding:14px 20px 14px 48px;
  border-radius:30px;
  border:3px solid rgba(255,255,255,0.85);
  width:320px;
  background:rgba(255,255,255,0.92);
  font-family:'League Spartan',sans-serif;
  font-size:15px;
  font-weight:700;
  letter-spacing:1px;
  outline:none;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
  color:#333;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.search:focus { border-color:#8b2e2e; box-shadow:0 4px 20px rgba(139,46,46,0.25); }
.search::placeholder { color:#999; font-weight:600; }

.search-wrap { position: relative; }
.search-wrap::before {
  content: "⌕";
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: #aaa;
  pointer-events: none;
}

.icon {
  width: 44px;
  height: 44px;
  border: 2px solid #e0c0c0;
  border-radius: 50%;
  background: rgba(255,255,255,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  color: #333;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.icon:hover { transform: scale(1.1); }

/* TITLE (MATCH MENU) */
.title{
  margin-top:80px;
  font-size:60px;
  font-weight:900;
  color:#8b2e2e;
  text-shadow:2px 2px 0 rgba(0,0,0,0.15);
  letter-spacing:5px;
}

/* GRID */
.grid{
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 columns */
  gap: 30px;
  padding: 0 80px;
}
/* CARD */
.card{
  width: 100%; /* fill grid cell */
  cursor: pointer;
  transition: 0.3s;
}

.card img{
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.card p{
  margin-top:10px;
  font-weight:900;
  font-size:14px;
  letter-spacing:2px;
  color:#333;
}

.card:hover{
  transform:scale(1.05);
}
</style>

</head>

<body>

<div class="top-icons">
  <img src="{{ url_for('static', filename='images/icon/home_button.png') }}"
       class="top-icon" alt="Home" onclick="goHome()">

  <img src="{{ url_for('static', filename='images/icon/back_button.png') }}"
       class="top-icon" alt="Back" onclick="goBack()">
</div>
<!-- TOP BAR -->
<div class="topbar">
  <div class="search-wrap">
    <input class="search" id="officeSearch" placeholder="Search office…" oninput="filterCards(this.value)">
  </div>
  <a href="/admin" class="icon" title="Admin Login">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#333"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
  </a>
</div>

<!-- TITLE -->
<div class="title">OFFICE INFORMATION</div>

<!-- GRID -->
<div class="grid">

  {% for o in offices %}
    <div class="card" onclick="go('{{ o.key }}')">

      <img src="{{ url_for('static', filename='images/offices/' + o.image) }}">

      <p>{{ o.name }}</p>

    </div>
  {% endfor %}



</div>

<script>
function go(name){
  window.location.href = "/office?name=" + name;
}
function goBack(){
  window.history.back();
}
function goHome(){
  window.location.href = "/menu";
}
function filterCards(q) {
  const term = q.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const label = card.querySelector('p').textContent.toLowerCase();
    card.style.display = label.includes(term) ? '' : 'none';
  });
}
</script>

<script src="/static/js/drag-scroll.js?v=2"></script>
<script src="/static/js/keyboard.js?v=2"></script>
</body>
</html>
