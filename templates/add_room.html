{% extends "admin/base.html" %}
{% block title %}Add Room{% endblock %}

{% block content %}
<div style="margin-bottom:16px">
    <a href="{{ url_for('admin.rooms') }}" style="color:#7b2d2d;text-decoration:none;font-size:14px">
        ← Back to Rooms
    </a>
</div>

<h1 class="page-title">Add Room</h1>

<div class="form-card">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="building">Building</label>
            <input type="text" id="building" name="building" placeholder="e.g. Main Building">
        </div>

        <div class="form-group">
            <label for="floor">Floor</label>
            <input type="text" id="floor" name="floor" placeholder="e.g. 2nd Floor">
        </div>

        <div class="form-group">
            <label for="room">Room</label>
            <input type="text" id="room" name="room" placeholder="e.g. Room 210">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Brief description of the room"></textarea>
        </div>

        <div class="form-group">
            <label>Floor Plan Position <span style="font-weight:400;color:#888">(% of image width/height)</span></label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <div>
                    <label style="font-size:12px;color:#666">Left %</label>
                    <input type="number" name="pos_left" min="0" max="100" value="0" step="1">
                </div>
                <div>
                    <label style="font-size:12px;color:#666">Top %</label>
                    <input type="number" name="pos_top" min="0" max="100" value="0" step="1">
                </div>
                <div>
                    <label style="font-size:12px;color:#666">Width %</label>
                    <input type="number" name="pos_width" min="1" max="100" value="10" step="1">
                </div>
                <div>
                    <label style="font-size:12px;color:#666">Height %</label>
                    <input type="number" name="pos_height" min="1" max="100" value="10" step="1">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="office_key">Office Key <span style="font-weight:400;color:#888">(links to office info page)</span></label>
            <input type="text" id="office_key" name="office_key" placeholder="e.g. Registrar">
        </div>

        <div class="form-group">
            <label for="room_color">Room Color <span style="font-weight:400;color:#888">(CSS color, optional)</span></label>
            <input type="text" id="room_color" name="room_color" placeholder="e.g. #e3c766">
        </div>

        <div style="display:flex;gap:10px;margin-top:8px">
            <button type="submit" class="btn btn-primary">Add Room</button>
            <a href="{{ url_for('admin.rooms') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
