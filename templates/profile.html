<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Profile</title>

<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'League Spartan',sans-serif;
}


body{
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:linear-gradient(180deg,#7b2d2d,#b85757);
  color:white;
  padding:22px 25px;
  overflow-y:auto;
  scrollbar-width: none;
}

.sidebar::-webkit-scrollbar { display: none; }

.sidebar h1{
  letter-spacing:4px;
  font-size:17px;
  margin-bottom:24px;
  line-height:1.4;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.menu button{
  background: none;
  border: none;
  font-family: inherit;
  width: 100%;
  text-align: left;
  font-size:15px;
  font-weight:700;
  letter-spacing:1px;
  color: rgba(255,255,255,0.75);
  padding:14px 16px;
  border-radius:20px;
  cursor:pointer;
  transition:0.2s;
  line-height:1.3;
}

.menu button.active{
  background: #f1dede;
  color: #7b2d2d;
  font-weight:700;
}

.menu button:hover{ color:white; }

/* MAIN */
.main{
  flex:1;
  background:url("/static/images/KIOSK BACKGROUND.png") center/cover no-repeat;
  position:relative;
  padding:30px 40px;
  overflow-y:auto;
}

/* TOP ICONS */
.top-icons{
  position:fixed;
  top:20px;
  left:280px;
  display:flex;
  gap:15px;
  z-index:100;
}

.top-icons img{
  width:44px;
  cursor:pointer;
  transition:0.2s;
}

.top-icons img:hover{
  transform:scale(1.1);
}

/* SEARCH */
.topbar{
  position:absolute;
  top:20px;
  right:40px;
  display:flex;
  align-items:center;
  gap:10px;
}

.search{
  padding:10px 15px;
  border-radius:20px;
  border:none;
  width:200px;
  background:#eee;
}

.icon{
  width:35px;
  height:35px;
  border:2px solid black;
  border-radius:50%;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  margin-top:50px;
  gap:25px;
}

/* PROFILE IMAGE (bigger like PDF) */
.header{
  display:flex;
  align-items:center;
  margin-top:80px;
  gap:30px;
}

.header img{
  width:150px;
  height:150px;
  border-radius:50%;
}

.header-text h2{
  font-size:32px;
  font-weight:900;
}

.header-text p{
  font-size:18px;
  margin-top:5px;
}

.header-text a{
  font-size:18px;
  margin-top:5px;
  display:inline-block;
}

/* TABLE */
.schedule-container{
  position:relative;
  margin-top:30px;
  width:100%;
  max-width:900px;
}

.schedule-bg{
  width:100%;
  display:block;
}

/* TEXT ON TOP OF IMAGE */
.sched-item{
  position:absolute;
  font-size:14px;
  text-align:center;
  padding:5px;
  border-radius:6px;
  color:rgb(8, 3, 3);
  font-weight:bold;
  line-height:1.2;
}

.rooms a{
  display:block;
  font-size:20px;
  margin-top:8px;
  color:#7b2d2d;
  font-weight:bold;
  text-decoration:none;
}

.location-links{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:10px;
}

.location-links a{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:15px;
  font-weight:700;
  letter-spacing:1px;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  text-decoration:none;
  width:fit-content;
}

.location-links .building-link{
  background:#7b2d2d;
  color:#fff;
}

.location-links .building-link:hover{
  background:#a03a3a;
}

.location-links .office-link{
  background:rgba(123,45,45,0.12);
  color:#7b2d2d;
  border:2px solid #7b2d2d;
}

.location-links .office-link:hover{
  background:rgba(123,45,45,0.22);
}

.dept-title{
  position:absolute;
  top:80px;
  left:60px;
  font-size:28px;
  font-weight:900;
  letter-spacing:2px;
}

/* Schedule table */
.sched-table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; }
.sched-table th { background:#7b2d2d; color:#fff; padding:8px 10px; font-size:13px; text-align:center; }
.sched-table td { border:1px solid #e0d0d0; height:50px; vertical-align:top; padding:4px 6px; font-size:12px; min-width:80px; }
.sched-table td.time-col { background:#f7f0f0; font-weight:700; color:#7b2d2d; text-align:center; width:70px; font-size:12px; }
.sched-cell { border-radius:6px; padding:4px 6px; font-size:12px; font-weight:700; line-height:1.3; }
.sched-cell.yellow  { background:#ffc107; color:#333; }
.sched-cell.green   { background:#2e8b57; color:#fff; }
.sched-cell.blue    { background:#3f6fd1; color:#fff; }
.sched-cell.teal    { background:#3ca6a6; color:#fff; }
.sched-cell.red     { background:#c0392b; color:#fff; }
.sched-cell.purple  { background:#8e44ad; color:#fff; }

/* COLORS */
.yellow{ background:#ffc107; color:black; }
.green{ background:#2e8b57; }
.blue{ background:#3f6fd1; }
.teal{ background:#3ca6a6; }

.schedule{
  margin-top:30px;
  width:100%;
  border-collapse:collapse;
  background:white;
}

.schedule th{
  font-size:14px;
  padding:8px;
  border:1px solid #999;
}

.schedule td{
  height:60px;
  border:1px solid #999;
  font-size:13px;
  text-align:center;
}

/* SUBJECT COLORS (match PDF tones) */
.yellow{ background:#ffc107; color:black; }
.green{ background:#2e8b57; color:white; }
.blue{ background:#3f6fd1; color:white; }
.teal{ background:#3ca6a6; color:white; }
</style>
</head>

<body>
<!-- ICONS -->
  <div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}" onclick="goHome()">
    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}" onclick="goBack()">
  </div>


<!-- SIDEBAR -->
<div class="sidebar">
  <h1>FACULTY</h1>
  <div class="menu" id="sidebarMenu">
  <button onclick="goFaculty('All')">ALL</button>
  <button onclick="goFaculty('Automotive Technology')">AUTOMOTIVE TECHNOLOGY</button>
  <button onclick="goFaculty('Civil Technology')">CIVIL TECHNOLOGY</button>
  <button onclick="goFaculty('Drafting Technology')">DRAFTING TECHNOLOGY</button>
  <button onclick="goFaculty('Electrical Technology')">ELECTRICAL TECHNOLOGY</button>
  <button onclick="goFaculty('Electronics Technology')">ELECTRONICS TECHNOLOGY</button>
  <button onclick="goFaculty('Food and Service Management')">FOOD AND SERVICE MANAGEMENT</button>
  <button onclick="goFaculty('Garments, Fashion and Design')">GARMENTS, FASHION AND DESIGN</button>
  <button onclick="goFaculty('Mechanical Technology')">MECHANICAL TECHNOLOGY</button>
  <button onclick="goFaculty('Welding and Fabrication Technology')">WELDING AND FABRICATION</button>
  <button onclick="goFaculty('Electronics Engineering')">ELECTRONICS ENGINEERING</button>
  <button onclick="goFaculty('Entrepreneurship')">ENTREPRENEURSHIP</button>
</div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SEARCH -->
  <div class="topbar">
    <input type="text" class="search" placeholder="Search..">
    <div class="icon"></div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <img src="https://i.pravatar.cc/150">
    <div class="header-text">
      <h2>MS. MARIEL BLANCA</h2>
      <p>ELECTRONICS DEPARTMENT</p>
      <div class="rooms"></div>
    </div>
  </div>

  <!-- SCHEDULE -->
<div class="schedule-container" id="scheduleContainer">
  <p id="schedPlaceholder" style="color:#aaa;font-size:16px;letter-spacing:1px;padding:20px;">
    NO SCHEDULE AVAILABLE
  </p>
  <div id="schedTableWrap" style="display:none;overflow-x:auto;margin-top:10px"></div>
</div>

<script>

function loadFromURL(){
  const params   = new URLSearchParams(window.location.search);
  const name     = params.get("name") || "";
  const dept     = params.get("dept") || "";
  const imgSrc   = params.get("img") || "";
  const schedImg = params.get("sched_img") || "";
  const officeKey  = params.get("office_key") || "";
  const officeName = params.get("office_name") || "";

  document.querySelector(".header-text h2").innerText = name || "—";
  document.querySelector(".header-text p").innerText  = dept ? dept.toUpperCase() : "";

  const AVATAR_FALLBACK = '/static/images/icon/avatar_placeholder.svg';
  const headerImg = document.querySelector(".header img");
  if(imgSrc) {
    headerImg.src = imgSrc;
    headerImg.onerror = function() { this.src = AVATAR_FALLBACK; this.onerror = null; };
  } else {
    headerImg.src = AVATAR_FALLBACK;
  }

  // Office badge
  const existing = document.querySelector(".location-links");
  if(existing) existing.remove();
  const SAFE_KEY = /^[A-Za-z0-9 _\-]+$/;
  if(officeKey && SAFE_KEY.test(officeKey)){
    const locDiv = document.createElement("div");
    locDiv.className = "location-links";
    const a = document.createElement("a");
    a.className = "office-link";
    a.textContent = officeName || officeKey;
    a.onclick = () => { window.location.href = "/office?name=" + encodeURIComponent(officeKey); };
    locDiv.appendChild(a);
    document.querySelector(".header-text").appendChild(locDiv);
  }

  // Rooms from URL param
  const BUILDING_SLUG = {
    "Academic Building":       "/academic_building",
    "IT Building":             "/it_building",
    "Tech Building":           "/tech_building",
    "Civil Tech Building":     "/civil_tech_building",
    "FSM Building":            "/fsm_building",
    "Mechanical Building":     "/mechanical_building",
    "Automotive Building":     "/automotive_building",
    "Rodriguez Building":      "/rodriguez_building",
    "New Admin Building":      "/new_admin_building",
    "Old Admin Building":      "/old_admin_building",
    "Graduate School Building":"/graduate_school_building",
    "Ylagan Hall":             "/ylagan_hall",
    "WAF & RAC Building":      "/waf_&_rac_building",
    "Science Building":        "/science_building",
    "TE Building":             "/te_building",
    "MIST-NCESTD Dorm":        "/mist_ncestd_dorm",
    "MIST-NCESTD Building":    "/mist_ncestd_building",
    "Multi-Purpose Building":  "/multi_purpose_building",
  };

  const building = params.get("building") || "";
  const roomsDiv = document.querySelector(".rooms");
  roomsDiv.textContent = "";
  try {
    const rooms = JSON.parse(params.get("room") || "[]");
    rooms.forEach(room => {
      const a = document.createElement("a");
      a.textContent = (building ? building + " — " : "") + room;
      a.onclick = () => {
        const slug = BUILDING_SLUG[building];
        if (slug) {
          window.location.href = slug + "?location=" + encodeURIComponent(room);
        } else if (building) {
          window.location.href = "/campus?location=" + encodeURIComponent(building);
        }
      };
      roomsDiv.appendChild(a);
    });
  } catch(e) {}

  // Schedule — show uploaded image if provided, otherwise load from DB
  const placeholder = document.getElementById("schedPlaceholder");
  const tableWrap   = document.getElementById("schedTableWrap");

  if(schedImg && /^\/static\//.test(schedImg)){
    placeholder.style.display = "none";
    const schedImgEl = document.createElement("img");
    schedImgEl.src = schedImg;
    schedImgEl.style.cssText = "width:100%;border-radius:8px;display:block;";
    document.getElementById("scheduleContainer").appendChild(schedImgEl);
  } else {
    const facultyId = params.get("id");
    if(facultyId){
      fetch("/api/faculty/" + facultyId + "/schedule")
        .then(r => r.json())
        .then(entries => {
          if(entries.length) {
            placeholder.style.display = "none";
            tableWrap.style.display = "block";
            tableWrap.appendChild(buildScheduleTable(entries));
            toast('Schedule loaded', 'success', 2000);
          }
        })
        .catch(() => { toast('Could not load schedule', 'error'); });
    }
  }
}

const DAYS  = ["MON","TUE","WED","THU","FRI","SAT"];
const TIMES = ["7:00","8:00","9:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"];
const TIME_LABELS = ["7-8 AM","8-9 AM","9-10 AM","10-11 AM","11 AM-12","12-1 PM","1-2 PM","2-3 PM","3-4 PM","4-5 PM","5-6 PM","6-7 PM"];

function buildScheduleTable(entries){
  const table = document.createElement("table");
  table.className = "sched-table";

  // Header row
  const thead = table.createTHead();
  const hrow  = thead.insertRow();
  const th0   = document.createElement("th");
  th0.textContent = "TIME";
  hrow.appendChild(th0);
  DAYS.forEach(d => {
    const th = document.createElement("th");
    th.textContent = d;
    hrow.appendChild(th);
  });

  // Build lookup map
  const map = {};
  entries.forEach(e => {
    const key = e.day + "|" + e.start;
    map[key] = e;
  });

  const tbody = table.createTBody();
  TIMES.forEach((t, i) => {
    const tr = tbody.insertRow();
    const tdTime = tr.insertCell();
    tdTime.className = "time-col";
    tdTime.textContent = TIME_LABELS[i];
    DAYS.forEach(d => {
      const td  = tr.insertCell();
      const key = d + "|" + t;
      if(map[key]){
        const e    = map[key];
        const cell = document.createElement("div");
        cell.className = "sched-cell " + (e.color || "yellow");
        cell.textContent = e.subject + (e.room ? "\n" + e.room : "");
        cell.style.whiteSpace = "pre-line";
        td.appendChild(cell);
      }
    });
  });

  return table;
}

function highlightActiveDept(){
  const params = new URLSearchParams(window.location.search);
  const currentDept = params.get("dept") || "All";

  document.querySelectorAll("#sidebarMenu button").forEach(btn => {
    btn.classList.remove("active");
    if(btn.textContent.trim().toUpperCase() === currentDept.toUpperCase()){
      btn.classList.add("active");
    }
  });
}

// NAVIGATION
function goBack(){
  window.history.back();
}

function goHome(){
  window.location.href="/menu";
}

function goFaculty(dept){
  window.location.href = "/faculty?dept=" + encodeURIComponent(dept);
}

// Load departments dynamically from DB
function loadSidebar(){
  fetch("/api/departments")
    .then(r => r.json())
    .then(depts => {
      const menu = document.getElementById("sidebarMenu");
      menu.textContent = "";
      const all = document.createElement("button");
      all.textContent = "ALL";
      all.onclick = () => goFaculty("All");
      menu.appendChild(all);
      depts.forEach(d => {
        const btn = document.createElement("button");
        btn.textContent = d.toUpperCase();
        btn.onclick = () => goFaculty(d);
        menu.appendChild(btn);
      });
      highlightActiveDept();
    })
    .catch(() => highlightActiveDept());
}

// RUN ON LOAD
loadFromURL();
loadSidebar();
</script>

<script src="/static/js/toast.js"></script>
<script src="/static/js/drag-scroll.js"></script>
<script src="/static/js/keyboard.js"></script>
</body>
</html>
