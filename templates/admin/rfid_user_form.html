{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if user else 'Add' }} RFID User{% endblock %}

{% block content %}
<div class="toolbar">
    <h1 class="page-title">{{ 'Edit User' if user else 'Add User' }}</h1>
    <a href="{{ url_for('content.rfid_users_list') }}" class="btn">← Back</a>
</div>

<form method="POST" style="max-width:480px">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label>RFID UID</label>
        <input type="text" name="rfid_uid" value="{{ user['rfid_uid'] if user else '' }}"
               placeholder="e.g. 0609475703" required style="font-family:monospace">
    </div>

    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ user['name'] if user else '' }}"
               placeholder="Full name" required>
    </div>

    <div class="form-group">
        <label>Role</label>
        <select name="role">
            <option value="student" {% if user and user['role'] == 'student' %}selected{% endif %}>Student</option>
            <option value="faculty" {% if user and user['role'] == 'faculty' %}selected{% endif %}>Faculty</option>
            <option value="visitor" {% if user and user['role'] == 'visitor' %}selected{% endif %}>Visitor</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if user else 'Add User' }}</button>
</form>
{% endblock %}
