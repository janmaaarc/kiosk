{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if building else 'Add' }} Building{% endblock %}
{% block content %}
<h1 class="page-title">{{ 'Edit' if building else 'Add' }} Building</h1>

<div class="form-card">
<form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="form-group">
    <label>Building Name *</label>
    <input type="text" name="name" required
           value="{{ building['name'] if building else '' }}"
           placeholder="e.g. Academic Building">
    <span class="hint">This name will appear in all building dropdowns across the admin.</span>
  </div>

  <div style="display:flex;gap:10px;margin-top:8px;">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('content.buildings_list') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
</div>
{% endblock %}
