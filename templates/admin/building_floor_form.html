{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if floor else 'Add' }} Building Floor{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Edit' if floor else 'Add' }} Building Floor</h1>

<div class="form-card">
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label>Building *</label>
        <input type="text" name="building"
               value="{{ floor['building'] if floor else '' }}"
               placeholder="e.g. Rodriguez Building" required>
    </div>

    <div class="form-group">
        <label>Floor Number *</label>
        <input type="number" name="floor_number" min="1"
               value="{{ floor['floor_number'] if floor else 1 }}" required>
    </div>

    <div class="form-group">
        <label>Floor Label *</label>
        <input type="text" name="floor_label"
               value="{{ floor['floor_label'] if floor else '' }}"
               placeholder="e.g. Ground Floor" required>
    </div>

    <div class="form-group">
        <label>Floor Plan Image <span style="font-weight:400;color:#888">(path under static/)</span></label>
        <div class="upload-row">
            <input type="text" id="floor-image-path" name="floor_image"
                   value="{{ floor['floor_image'] if floor else '' }}"
                   placeholder="e.g. images/floor_plans/rodriguez_f1.png">
            <input type="file" id="floor-image-file" accept="image/*"
                   onchange="previewUpload('floor-image-file','floor-image-path')">
        </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('content.building_floors_list') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
</div>
{% endblock %}
