<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>{% block title %}Admin{% endblock %} — Kiosk CMS</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; color: #222; }

.sidebar {
    position: fixed; top: 0; left: 0; width: 220px; height: 100vh;
    background: #7b2d2d; color: #fff; padding: 24px 16px; overflow-y: auto;
}
.sidebar h2 { font-size: 15px; letter-spacing: 2px; margin-bottom: 28px; opacity: .7; }
.sidebar nav a {
    display: block; padding: 10px 12px; border-radius: 6px;
    color: #fff; text-decoration: none; font-size: 14px; margin-bottom: 4px;
}
.sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,0.15); }
.sidebar nav .section { font-size: 11px; letter-spacing: 1px; opacity: .5;
    margin: 16px 0 6px; text-transform: uppercase; }

.main { margin-left: 220px; padding: 32px; }

.page-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #7b2d2d; }

table { width: 100%; border-collapse: collapse; background: #fff;
    border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
th { background: #7b2d2d; color: #fff; padding: 12px 14px; text-align: left;
    font-size: 13px; font-weight: 600; letter-spacing: .5px; }
td { padding: 11px 14px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fdf5f5; }

.btn {
    display: inline-block; padding: 7px 14px; border-radius: 5px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
    transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: #7b2d2d; color: #fff; }
.btn-secondary { background: #555; color: #fff; }
.btn-danger { background: #c0392b; color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

.form-card { background: #fff; border-radius: 8px; padding: 28px 32px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1); max-width: 700px; }
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
input[type=text], input[type=datetime-local], textarea, select {
    width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 5px;
    font-size: 14px; font-family: inherit;
}
textarea { resize: vertical; min-height: 100px; }
.hint { font-size: 12px; color: #888; margin-top: 4px; }

.upload-row { display: flex; gap: 10px; align-items: center; }
.upload-row input[type=text] { flex: 1; }

.flash { padding: 10px 16px; border-radius: 5px; margin-bottom: 16px; font-size: 14px; }
.flash-success { background: #d4edda; color: #155724; }
.flash-error { background: #f8d7da; color: #721c24; }

.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.img-thumb { width: 48px; height: 36px; object-fit: cover; border-radius: 3px; }

.expired-badge { background: #ffc107; color: #333; font-size: 11px;
    padding: 2px 6px; border-radius: 10px; margin-left: 6px; }
</style>
</head>
<body>

<div class="sidebar">
    <h2>KIOSK CMS</h2>
    <nav>
        <a href="{{ url_for('admin.dashboard') }}" class="{% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
            Dashboard
        </a>
        <div class="section">Content</div>
        <a href="{{ url_for('content.events_list') }}" class="{% if 'event' in request.endpoint %}active{% endif %}">
            Events
        </a>
        <a href="{{ url_for('content.announcements_list') }}" class="{% if 'announcement' in request.endpoint %}active{% endif %}">
            Announcements
        </a>
        <a href="{{ url_for('content.offices_list') }}" class="{% if 'office' in request.endpoint %}active{% endif %}">
            Offices
        </a>
        <div class="section">Data</div>
        <a href="{{ url_for('admin.rooms') }}" class="{% if request.endpoint == 'admin.rooms' %}active{% endif %}">Rooms</a>
        <a href="{{ url_for('content.building_floors_list') }}" class="{% if 'building_floor' in request.endpoint %}active{% endif %}">Building Floors</a>
        <a href="{{ url_for('content.faculty_list') }}" class="{% if 'faculty' in request.endpoint %}active{% endif %}">Faculty</a>
        <div class="section">Account</div>
        <a href="{{ url_for('admin.logout') }}">Logout</a>
    </nav>
</div>

<div class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>

<script>
function previewUpload(inputId, pathId) {
    const input = document.getElementById(inputId);
    const pathField = document.getElementById(pathId);
    const file = input.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    fetch('/admin/upload', { method: 'POST', body: fd,
        headers: { 'X-CSRFToken': document.querySelector('meta[name=csrf-token]')?.content || '' }
    })
    .then(r => r.json())
    .then(d => {
        if (d.path) pathField.value = d.path;
        else alert(d.error || 'Upload failed');
    })
    .catch(() => alert('Upload failed'));
}
</script>
</body>
</html>
