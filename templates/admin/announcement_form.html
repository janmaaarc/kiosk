{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if announcement else 'Add' }} Announcement{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Edit' if announcement else 'Add' }} Announcement</h1>

<div class="form-card">
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label>Title *</label>
        <input type="text" name="title"
               value="{{ announcement['title'] if announcement else '' }}" required>
    </div>

    <div class="form-group">
        <label>Thumbnail image path</label>
        <div class="upload-row">
            <input type="text" id="thumb-path" name="thumbnail"
                   value="{{ announcement['thumbnail'] if announcement else '' }}"
                   placeholder="e.g. announcements/11.jpeg">
            <input type="file" id="thumb-file" accept="image/*"
                   onchange="previewUpload('thumb-file','thumb-path')">
        </div>
    </div>

    <div class="form-group">
        <label>PDF file path</label>
        <div class="upload-row">
            <input type="text" id="file-path" name="file"
                   value="{{ announcement['file'] if announcement else '' }}"
                   placeholder="e.g. announcements/tr1.pdf">
            <input type="file" id="file-upload" accept="application/pdf"
                   onchange="previewUpload('file-upload','file-path')">
        </div>
    </div>

    <div class="form-group">
        <label>Published at</label>
        <input type="datetime-local" name="published_at"
               value="{{ announcement['published_at'][:16].replace(' ','T') if announcement and announcement['published_at'] else '' }}">
    </div>

    <div class="form-group">
        <label>Expires at <span style="font-weight:400;color:#888">(leave blank = never)</span></label>
        <input type="datetime-local" name="expires_at"
               value="{{ announcement['expires_at'][:16].replace(' ','T') if announcement and announcement['expires_at'] else '' }}">
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('content.announcements_list') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
</div>
{% endblock %}
