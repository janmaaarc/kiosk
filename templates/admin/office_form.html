{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if office else 'Add' }} Office{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Edit' if office else 'Add' }} Office</h1>

<div class="form-card">
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label>Key * <span style="font-weight:400;color:#888">(unique slug, no spaces)</span></label>
        <input type="text" name="key"
               value="{{ office['key'] if office else '' }}"
               placeholder="e.g. Registrar" required>
    </div>

    <div class="form-group">
        <label>Display name *</label>
        <input type="text" name="name"
               value="{{ office['name'] if office else '' }}" required>
    </div>

    <div class="form-group">
        <label>Image path</label>
        <div class="upload-row">
            <input type="text" id="image-path" name="image"
                   value="{{ office['image'] if office else '' }}"
                   placeholder="e.g. OSA.jpg">
            <input type="file" id="image-file" accept="image/*"
                   onchange="previewUpload('image-file','image-path')">
        </div>
    </div>

    <div class="form-group">
        <label>Location</label>
        <input type="text" name="location"
               value="{{ office['location'] if office else '' }}"
               placeholder="e.g. Admin Building, Room 101">
    </div>

    <div class="form-group">
        <label>Office hours</label>
        <input type="text" name="hours"
               value="{{ office['hours'] if office else '' }}"
               placeholder="e.g. 8:00 AM - 5:00 PM">
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea name="desc">{{ office['desc'] if office else '' }}</textarea>
    </div>

    <div class="form-group">
        <label>Published at</label>
        <input type="datetime-local" name="published_at"
               value="{{ office['published_at'][:16].replace(' ','T') if office and office['published_at'] else '' }}">
    </div>

    <div class="form-group">
        <label>Expires at <span style="font-weight:400;color:#888">(leave blank = never)</span></label>
        <input type="datetime-local" name="expires_at"
               value="{{ office['expires_at'][:16].replace(' ','T') if office and office['expires_at'] else '' }}">
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('content.offices_list') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
</div>
{% endblock %}
