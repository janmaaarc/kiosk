<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Kiosk</title>

<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'League Spartan';
}


body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  position: relative;
}

/* LEFT PANEL */
.sidebar {
  width:260px;
  background:linear-gradient(180deg,#7b2d2d,#b85757);
  color:white;
  padding:70px 25px;

  overflow-y:auto;          /* ✅ scroll */
  scrollbar-width: none;    /* Firefox */
}

.sidebar::-webkit-scrollbar {
  display: none;            /* Chrome */
}

.sidebar h1 {
  letter-spacing: 8px;
  font-size: 22px;
  margin-bottom: 30px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.menu button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  text-align: left;
  font-size: 16px;
  letter-spacing: 2px;
  padding: 12px 15px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

/* OBLONG SELECTED STYLE (PDF STYLE) */
.menu button.active {
  background: rgba(255,255,255,0.2);
  color: white;
  font-weight: bold;
}

.menu button:hover {
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  position: relative;
  background: url("/static/images/KIOSK BACKGROUND.png") center/cover no-repeat;
  overflow-y: auto; /* 🔥 ADD */
}



/* TOP BAR */
.topbar {
  position: absolute;
  top: 20px;
  right: 40px;
  display: flex;
  align-items: center;
  gap: 15px;
}

.search {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  width: 240px;
  font-size: 16px;
  background: rgba(255,255,255,0.9);
  outline: none;
}
.icon {
  width: 35px;
  height: 35px;
  border: 2px solid black;
  border-radius: 50%;
}

/* GRID */
.grid{
  margin-top:10px;
  padding:0 60px 40px;
  width:100%;

  display:grid;
  grid-template-columns: repeat(auto-fill, 180px); /* 🔥 fixed size */
  justify-content:flex-start; /* 🔥 left aligned */
  gap:35px;
}
.card {
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
/* SELECTED FACULTY EFFECT */
.card.selected img {
  outline: 5px solid rgba(255,255,255,0.9);
  box-shadow: 0 0 25px rgba(255,255,255,0.8),
              0 0 50px rgba(255,255,255,0.4);
  transform: scale(1.1);
  transition: 0.3s;
   background: white;
  padding: 5px;
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255,255,255,0.7);
}

.card p {
  margin-top: 10px;
  font-weight: bold;
  font-size: 15px;
  letter-spacing: 1px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 30px;
  width: 320px;
  text-align: center;
  border-radius: 10px;
}

.close {
  margin-top: 20px;
  padding: 10px;
  background: black;
  color: white;
  cursor: pointer;
}

/* TOP BAR */
.top-bar {
    position: relative;
    width: 100%;
    height: 60px;
}

/* TOP LEFT ICONS (LIKE PDF) */
.top-icons {
    position: absolute;
    top: 20px;
    left: 280px;
    display: flex;
    gap: 10px;
    z-index: 20;
}

.top-icon {
    width: 35px;
    height: 35px;
    cursor: pointer;
    transition: 0.2s;
}

.top-icon:hover {
    transform: scale(1.1);
}
.dept-title{
  width:100%;
  text-align:center;
  margin-top:90px;   /* push below top icons */
  margin-bottom:25px;
  color:#7b2d2d;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  font-size:30px;
  font-weight:900;
  letter-spacing:3px;
}



</style>
</head>

<body>

<div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}" 
         class="top-icon" alt="Home" onclick="goHome()">
         

    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}" 
         class="top-icon" alt="Back" onclick="goBack()">
</div>

<div class="sidebar">
  <h1 style="letter-spacing: 10px;">FACULTY</h1>
  <div class="menu" id="menu"></div>
</div>


<div class="main">
  <div class="overlay"></div>
  <h2 class="dept-title" id="deptTitle">ALL</h2>
  <div class="topbar">
    <input type="text" id="search" class="search" placeholder="Search..">
    <div class="icon"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>


<script>
const data = {{ faculty_list | tojson }};

// Build department list dynamically from DB data, plus "All"
const deptSet = new Set(data.map(d => d.department).filter(Boolean));
const categories = ["All", ...Array.from(deptSet).sort()];


const grid = document.getElementById("grid");
const menu = document.getElementById("menu");
const search = document.getElementById("search");

let active = "All";

function renderMenu(){
  menu.innerHTML="";
  categories.forEach(c=>{
    const btn=document.createElement("button");
    btn.textContent=c.toUpperCase();
    if(c===active) btn.classList.add("active");
    btn.onclick=()=>{active=c; render();};
    menu.appendChild(btn);
  });
}

function render(){
  renderMenu();
  grid.innerHTML="";

  const title = document.getElementById("deptTitle");
  title.innerText = active.toUpperCase();

  const text = search.value.toLowerCase();
  

  const filtered = data
    .filter(d => active === "All" || d.department === active)
    .filter(d => d.name.toLowerCase().includes(text));

  if (filtered.length === 0) {
    const msg = document.createElement("p");
    msg.style.cssText = "color:#888;font-size:16px;letter-spacing:1px;margin-top:20px;width:100%";
    msg.textContent = "NO RESULTS FOUND";
    grid.appendChild(msg);
    return;
  }

  filtered.forEach(d => {
    const div = document.createElement("div");
    div.className = "card";

    const img = document.createElement("img");
    img.src = d.photo
      ? "/static/" + d.photo
      : "https://ui-avatars.com/api/?name=" + encodeURIComponent(d.name) + "&size=110&background=8b2e2e&color=fff&bold=true";
    img.alt = "";

    const nameEl = document.createElement("p");
    nameEl.textContent = d.name;

    const deptEl = document.createElement("small");
    deptEl.style.cssText = "color:#666;font-size:12px;letter-spacing:.5px;display:block";
    deptEl.textContent = d.department || "";

    div.appendChild(img);
    div.appendChild(nameEl);
    div.appendChild(deptEl);

    if (d.building && d.room) {
      const btn = document.createElement("button");
      btn.textContent = "FIND ON MAP";
      btn.style.cssText = "margin-top:6px;background:#8b2e2e;color:#fff;border:none;"
        + "border-radius:10px;padding:4px 10px;font-size:11px;letter-spacing:1px;"
        + "cursor:pointer;font-family:inherit";
      btn.addEventListener("click", e => {
        e.stopPropagation();
        findOnMap(d.building, d.room);
      });
      div.appendChild(btn);
    }

    div.onclick = () => {
      selectCard(div);
      setTimeout(() => goToProfile(d), 200);
    };

    grid.appendChild(div);
  });
}

search.addEventListener("input", render);

function goToProfile(d) {
  const query = new URLSearchParams({
    name: d.name,
    dept: d.department || "",
    room: JSON.stringify(d.room ? [d.room] : []),
    img: d.photo ? "/static/" + d.photo : "",
    building: d.building || "",
    office_key: d.office_key || "",
    office_name: d.office_name || ""
  }).toString();
  window.location.href = "/profile?" + query;
}

function findOnMap(building, room) {
  const buildingSlug = {
    "Rodriguez Building": "/rodriguez_building",
    "MIST-NCESTD Dorm": "/mist_ncestd_dorm",
    "MIST-NCESTD Building": "/mist_ncestd_building",
    "Multi-Purpose Building": "/multi_purpose_building",
    "Power Room": "/power_room",
    "Ylagan Hall": "/ylagan_hall",
    "Automotive Building": "/automotive_building",
    "Academic Building": "/academic_building",
    "WAF & RAC Building": "/waf_&_rac_building",
    "New Admin Building": "/new_admin_building",
    "Old Admin Building": "/old_admin_building",
    "FSM Building": "/fsm_building",
    "Civil Tech Building": "/civil_tech_building",
    "WAF & FSM Building": "/waf_&_fsm_building",
    "Tech Building": "/tech_building",
    "Graduate School Building": "/graduate_school_building",
    "Mechanical Building": "/mechanical_building",
    "TE Building": "/te_building",
    "Science Building": "/science_building",
    "IT Building": "/it_building",
  };
  const url = buildingSlug[building];
  if (url) {
    window.location.href = url + "?location=" + encodeURIComponent(room);
  }
}

function goToMap(location){
  window.location.href = "/campus_map?location=" + encodeURIComponent(location);
}

function selectCard(selectedCard) {
  // remove previous selection
  document.querySelectorAll(".card").forEach(card => {
    card.classList.remove("selected");
  });

  // add to clicked card
  selectedCard.classList.add("selected");
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

render();
function goBack() {
    window.history.back();
}

function goHome() {
    window.location.href = "/"; // change if your home route is different
}

</script>

</body>
</html>
