<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'League Spartan', sans-serif;
  height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  background: #111;
}

/* ── Slideshow ───────────────────────────────────── */
.slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1.4s ease-in-out;
}
.slide.active { opacity: 1; }

/* Warm cream tint — matches the screenshot */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}

.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

.text h1 {
  font-size: clamp(80px, 10vw, 140px);
  font-weight: 900;
  letter-spacing: 12px;
  line-height: 1;
}

.text p {
  margin-top: 24px;
  font-size: clamp(20px, 2.2vw, 32px);
  font-weight: 700;
  letter-spacing: 6px;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
</style>
</head>

<body onclick="window.location.href='/menu'">

  <div class="slide active" style="background-image:url('/static/images/screensaver/slide1.png')"></div>
  <div class="slide"        style="background-image:url('/static/images/screensaver/slide2.png')"></div>
  <div class="slide"        style="background-image:url('/static/images/screensaver/slide3.png')"></div>
  <div class="slide"        style="background-image:url('/static/images/screensaver/slide4.png')"></div>

  <div class="overlay"></div>

  <div class="text">
    <h1>WELCOME</h1>
    <p>SCAN YOUR RFID TO ACCESS THE KIOSK</p>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let idx = 0;
    setInterval(() => {
      slides[idx].classList.remove('active');
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add('active');
    }, 4000);

    let rfidBuffer = "";
    let rfidTimer = null;
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (rfidBuffer.length > 4) window.location.href = '/rfid?uid=' + encodeURIComponent(rfidBuffer);
        rfidBuffer = "";
        clearTimeout(rfidTimer);
        return;
      }
      if (e.key.length === 1) rfidBuffer += e.key;
      clearTimeout(rfidTimer);
      rfidTimer = setTimeout(() => {
        if (rfidBuffer.length > 4) window.location.href = '/rfid?uid=' + encodeURIComponent(rfidBuffer);
        rfidBuffer = "";
      }, 100);
    });
  </script>

</body>
</html>
