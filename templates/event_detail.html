<!DOCTYPE html>
<html>
<head>
    <title>{{ event['title'] }}</title>

    <style>
        @font-face {
          font-family: 'League Spartan';
          src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf') format('truetype');
          font-weight: 100 900;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'League Spartan', sans-serif; }

        body {
            background: #f5f5f5;
            overflow-y: auto;
        }

        .top-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .top-icon {
            width: 44px;
            height: 44px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .top-icon:hover { transform: scale(1.1); }

        .icon {
            width: 44px; height: 44px;
            border: 2px solid #e0c0c0;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; color: #333;
            flex-shrink: 0; transition: transform 0.2s;
        }
        .icon:hover { transform: scale(1.1); }

        .topbar {
            position: absolute;
            top: 20px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }

        .container {
            display: flex;
            gap: 40px;
            padding: 80px 50px 50px;
        }

        .left img {
            width: 350px;
            border-radius: 12px;
        }

        .right {
            max-width: 800px;
        }

        h1 {
            color: #7a1f2a;
            font-size: 50px;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}"
         class="top-icon" alt="Home" onclick="window.location.href='/menu'">
    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}"
         class="top-icon" alt="Back" onclick="history.back()">
</div>

<div class="topbar">
    <a href="/admin" class="icon" title="Admin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#333"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
    </a>
</div>

<div class="container">
    <div class="left">
        <img src="{{ url_for('static', filename=event['image']) }}">
    </div>

    <div class="right">
        <h1>{{ event['title'] }}</h1>
        <p style="white-space:pre-wrap">{{ event['details'] }}</p>
    </div>
</div>

<script src="/static/js/drag-scroll.js?v=2"></script>
</body>
</html>
