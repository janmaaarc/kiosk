<!DOCTYPE html>
<html>
<head>
    <title>View Announcement</title>

    <style>
        body {
            margin: 0;
            background: black;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="back" onclick="history.back()">Back</div>

<iframe src="{{ url_for('static', filename=file) }}"></iframe>

</body>
</html>
