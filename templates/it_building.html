<!DOCTYPE html>
<html>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<head>
<meta charset="UTF-8">
<title>IT Building</title>

<style>
@font-face {
  font-family: 'League Spartan';
  src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'League Spartan';

  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body{
  margin:0;
  display:flex;
  height:100vh;
  overflow: hidden; 
  background: url("/static/images/KIOSK BACKGROUND.png") no-repeat center center fixed; 
  background-size: cover; 
}

/* TOP BUTTONS (OUTSIDE PANEL) */
.top-bar{
  position:absolute;
  top:20px;
  left:280px;
  right:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LEFT SIDE (HOME + BACK) */
.top-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.top-left img{
  width:40px;
  cursor:pointer;
  transition:0.2s;
}

.top-left img:hover{
  transform: scale(1.1);
}

/* RIGHT SIDE (SEARCH) */
.top-right{
  display:flex;
  align-items:center;
}

/* SEARCH BOX */
.search {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  width: 220px;
  background: rgba(255,255,255,0.9);
  outline: none;
}

.top-icons img:hover {
  transform: scale(1.1); 
} 

/* SIDE PANEL */
.side-panel{
  width:260px;
  background:linear-gradient(180deg,#7b2d2d,#b85757);
  color:white;
  padding:70px 25px;
  display:flex;
  flex-direction:column;
  text-align: left;
  padding-left: 20px;

}

.sidebar::-webkit-scrollbar {
  display: none;            /* Chrome */
}

.sidebar h1 {
  letter-spacing: 8px;
  font-size: 18px;
  margin-bottom: 30px;
}

/* FLOOR BUTTONS */
.floor-btn{
  width:100%;
  padding:14px;
  margin:12px 0;
  border:none;
  border-radius:30px;
  background:transparent;
  color:white;
  font-size:15px;
  font-weight:600;
  letter-spacing:1px;
  text-align: left;
  padding-left: 20px;
}

/* SELECTED (PDF STYLE HIGHLIGHT) */
.floor-btn.active{
  background:white;
  color:#7b2d2d;
  font-weight:700;
}

/* MAIN CONTENT */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* TITLE */
.main h1{
  font-size:38px;
  font-weight:900;
  letter-spacing:4px;
  color:#7b2d2d;
  margin-top:90px;
  text-align:center;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.search {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  width: 220px;
  background: rgba(255,255,255,0.9);
  outline: none;
}



.room:hover {
  background: #7b2d2d;
  color: white;
}

.map-container{
  position: relative;
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 12px;
}

.floor-display{
  width: 75%;
  height: 55%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* MAP CONTAINER */
.map{
  position: relative;
  width: 100%;
  height: 100%;
  background: #e6c866;
  border-radius: 10px;
  border: 2px solid black;
}

/* ROOMS (WHITE BOXES LIKE IMAGE) */
.room{
  position: absolute;
  background: #e9e9e9;
  border: 2px solid black;
  border-radius: 6px;
  font-size: 0.65vw;
  font-weight: 700;
  text-align: center;
  display:flex;
  justify-content:center;
  align-items:center;
  padding: 4px;
}

/* REMOVE INTERACTION */
.room:hover{
  background: #e9e9e9;
  color: black;
  cursor: default;
}

/* HALLWAY */
.hallway{
  position: absolute;
  top: 43%;
  left: 0;
  width: 100%;
  height: 10%;
  background: #d9d9d9;
  border-top: 3px solid black;
  border-bottom: 3px solid black;
  border-radius: 10px;
}

/* STAIRS (CENTER) */
.stairs{
  position: absolute;
  top: 47%;
  left: 48%;
  width: 3.5%;
  height: 18%;
  background: repeating-linear-gradient(
    to right,
    black,
    black 2px,
    transparent 2px,
    transparent 6px
  );
  border: 1px solid black;
}

.dept-title{
  width:100%;
  text-align:center;
  margin-top:90px;   /* push below top icons */
  margin-bottom:25px;
  color:#7b2d2d;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  font-size:30px;
  font-weight:900;
  letter-spacing:3px;
}

.direction-btn{
  position: absolute;
  top: 100px;        /* 👈 ABOVE MAP */
  right: 5px;      /* 👈 RIGHT SIDE OF MAP */

  display: flex;
  align-items: center;
  gap: 10px;

  padding: 14px 22px;
  border: none;

  color: rgb(0, 0, 0);
  font-weight: 700;
  letter-spacing: 1px;
  font-size: 13px;

  cursor: pointer;
  transition: 0.2s;
  z-index: 10; /* 👈 ensures it stays above map */
}

/* ICON */
.dir-icon{
  width: 40px;
  height: 30px;
}

/* HOVER */
.direction-btn:hover{
  transform: scale(1.05);
}

.map{
  position: relative;
  width: 100%;
  height: 100%;
  background: #f4d66d;
  border-radius: 10px;
}

/* ROOMS */
.room{
  position: absolute;
  border: 2px solid black;
  text-align: center;
  font-size: 0.7vw;
  font-weight: 700;
  padding: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* RED SELECTED ROOM */
.highlight{
  background: #a94442;
  color: white;
}

/* HALLWAY */
.hallway{
  position: absolute;
  top: 40%;
  left: 0;
  width: 100%;
  height: 12%;
  border-top: 3px solid black;
  border-bottom: 3px solid black;
}

/* STAIRS (CENTER-RIGHT LIKE IMAGE) */
.stairs{
  position: absolute;
  top: 210px;
  left: 34%;
  width: 5%;
  height: 20%;
  background: repeating-linear-gradient(
    to right,
    black,
    black 2px,
    transparent 2px,
    transparent 8px
  );
  border: 1px solid black;
}

/* GAP */
.gap{
  position: absolute;
  height: 12%;
}

/* OPEN SPACE CENTER */
.open-space{
  position: absolute;
  bottom: 3%;
  left: 40%;
  width: 30%;
  height: 18%;
}
/* (Replace this with your actual floor image later) */
</style>

</head>

<body>

<!-- TOP BUTTONS -->
<div class="top-bar">

  <div class="top-left">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}" onclick="goHome()">
    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}" onclick="goBack()">
  </div>

  <div class="top-right">
    <input type="text" id="search" class="search" placeholder="Search..">
  </div>

</div>
</div>

<!-- SIDE PANEL -->
<div class="side-panel">
  <h1 style="letter-spacing: 10px; font-size:18px;">CAMPUS MAP</h1>
  <button class="floor-btn active" onclick="changeFloor(this, '1st Floor')">1ST FLOOR</button>
  <button class="floor-btn" onclick="changeFloor(this, '2nd Floor')">2ND FLOOR</button>
  <button class="floor-btn" onclick="changeFloor(this, '3rd Floor')">3RD FLOOR</button>
  <button class="floor-btn" onclick="changeFloor(this, '4th Floor')">4TH FLOOR</button>
  <button class="floor-btn" onclick="changeFloor(this, '5th Floor')">5TH FLOOR</button>
</div>

<!-- MAIN -->
<div class="main">
  <h1>IT BUILDING</h1>

  <button class="direction-btn" onclick="showDirections()">
      <img src="{{ url_for('static', filename='images/icon/show_directions_button.png') }}" class="dir-icon">
      <span>SHOW DIRECTION</span>
  </button>

  <!-- MAP CONTAINER -->
  <div class="floor-display">
  <div class="map">

    <!-- TOP ROW -->
    <div class="room" style="top:6%; left:10%; width:12%;">RECORD AND<br>INFORMATION CENTER</div>

    <div class="room" style="top:6%; left:23%; width:12%;">
      MEDICAL AND<br>DENTAL SERVICES
    </div>

    <div class="room" style="top:6%; left:36%; width:9%;">MPC CARES</div>

    <div class="room" style="top:6%; left:46%; width:32%;">FACULTY ROOM</div>

    <div class="room" style="top:6%; right:8%; width:7%;">CR</div>

    <!-- HALLWAY -->
    <div class="hallway"></div>

    <!-- STAIRS -->
    <div class="stairs"></div>

    <!-- BOTTOM ROW -->
    <div class="room" style="bottom:6%; left:10%; width:14%;">
      QUALITY<br>ASSURANCE OFFICE
    </div>

    <div class="room" style="bottom:6%; left:26%; width:14%;">
      CONFERENCE ROOM
    </div>

    <div class="room" style="bottom:6%; right:24%; width:14%;">
      REPAIR AND<br>MAINTENANCE
    </div>

    <div class="room" style="bottom:6%; right:8%; width:16%;">
      FUNCTION HALL
    </div>

  </div>
</div>


<script>

function goHome(){
  window.location.href = "/menu";
}

function goBack(){
  window.location.href = "/campus";
}

/* CHANGE FLOOR */
function changeFloor(btn, floorName){

  // remove active
  document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));

  // add active
  btn.classList.add('active');

  // change display
  document.getElementById("floorDisplay").innerHTML = floorName + " MAP";

  // OPTIONAL: redirect instead
  // window.location.href = `/it_building_floor?floor=${floorName}`;
}


// search//
const search = document.getElementById("search");

search.addEventListener("input", function(){
  const value = this.value.toLowerCase();

  document.querySelectorAll(".floor-btn").forEach(btn => {
    const text = btn.innerText.toLowerCase();

    if(text.includes(value)){
      btn.style.display = "block";
    } else {
      btn.style.display = "none";
    }
  });
});

</script>

</body>
</html>
