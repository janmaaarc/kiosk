<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Room Navigation</title>

<style>
body {
  margin: 0;
  font-family: 'League Spartan', sans-serif;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 300px;
  background: #7b3f3f;
  color: white;
  padding: 20px;
  overflow-y: auto;
}

.room {
  padding: 10px;
  margin: 5px 0;
  border-radius: 20px;
  cursor: pointer;
}

.room:hover {
  background: rgba(255,255,255,0.2);
}

.active {
  background: #a85c5c;
}

/* MAIN */
.main {
  flex: 1;
  background: #f2f2f2;
  position: relative;
}

.title {
  text-align: center;
  margin-top: 40px;
  font-size: 30px;
  color: #8b3a3a;
}

/* ROOM LAYOUT */
.layout {
  width: 600px;
  height: 300px;
  margin: 50px auto;
  border: 2px solid black;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 20px;
}

.box {
  background: gray;
  border-radius: 20px;
}

/* BUTTON */
.showBtn {
  position: absolute;
  top: 120px;
  right: 50px;
  cursor: pointer;
}

#path-line {
  position: absolute;
  height: 6px;
  background: purple;
  border-radius: 5px;
  top: 120px;   /* adjust based on entrance */
  left: 50px;   /* start point */
  width: 0;
  transition: width 0.5s ease;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>CAMPUS MAP</h2>

    <div class="room" onclick="goToRoom('room 101')">QA OFFICE</div>
    <div class="room" onclick="goToRoom('room 102')">CONFERENCE ROOM</div>
    <div class="room" onclick="goToRoom('room 103')">FACULTY ROOM</div>
</div>

<div class="main">

  <div class="title">CAMPUS MAP</div>

  <div class="showBtn" onclick="showDirection()">SHOW DIRECTION 📍</div>

  <div class="layout">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>
  <div id="path-line"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

if(room){
  showPath(room);
}
function showPath(room){
  const path = document.getElementById("path-line");

  if(room === "Room 102"){
    path.style.width = "250px"; // goes to Room 102
  }

  if(room === "Room 101"){
    path.style.width = "150px";
  }

  if(room === "Lab 1"){
    path.style.width = "200px";
    path.style.top = "200px"; // different direction
  }
}


let selectedRoom = null;

function selectRoom(el, room){
  document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
  el.classList.add('active');
  selectedRoom = room;
}

function showDirection(){
  if(!selectedRoom){
    alert("Select a room first!");
    return;
  }

  // go back to indoor navigation with selected room
  window.location.href = "/building_navigation?room=" + selectedRoom;
}


function goToRoom(room){
  window.location.href = "/building_navigation?room=" + room;
}

</script>

</body>
</html>
