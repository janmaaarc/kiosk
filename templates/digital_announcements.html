<!DOCTYPE html>
<html>
<head>

    <style>
        @font-face {
            font-family: 'League Spartan';
            src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
        }

        body {
            margin: 0;
            font-family: 'League Spartan', sans-serif;
            background: url("/static/images/KIOSK BACKGROUND.png") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .title {
            text-align: center;
            font-size: 55px;
            font-weight: 900;
            color: #8b2e2e;
            text-shadow: 2px 2px 0 black;
            letter-spacing: 5px;
            margin-top: 50px;
            flex-shrink: 0;
        }

        .grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            padding: 24px 40px 40px;
            align-content: start;
            overflow-y: auto;
        }

        .card {
            cursor: pointer;
            text-align: center;
        }

        .card p {
            font-weight: 900;
            font-size: 18px;
            margin-top: 10px;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .top-icons {
  position: fixed;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 12px;
  z-index: 1000;
}

.top-icon {
  width: 50px;
  height: 50px;
  padding: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.top-icon:hover {
  transform: scale(1.1);
  background: #8b2e2e;
}

.admin-btn {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 38px;
  height: 38px;
  background: rgba(0,0,0,0.18);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
  z-index: 100;
  text-decoration: none;
}
.admin-btn:hover { background: rgba(0,0,0,0.4); }
.admin-btn svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.7); }
</style>

</head>

<body>
    <h1 class="title">DIGITAL ANNOUNCEMENTS</h1>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()" style="
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
    z-index:9999;align-items:center;justify-content:center;cursor:pointer;">
    <img id="lightbox-img" src="" style="
        max-width:90vw;max-height:90vh;border-radius:12px;
        box-shadow:0 20px 60px rgba(0,0,0,0.6);object-fit:contain;">
</div>

<div class="grid">
    {% for a in announcements %}
    <div class="card" onclick="openImage('{{ url_for('static', filename=a.thumbnail) }}')">
        <img src="{{ url_for('static', filename=a.thumbnail) }}">
        <p>{{ a.title }}</p>
    </div>
    {% endfor %}
</div>

<div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}"
         class="top-icon" alt="Home" onclick="goHome()">

    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}"
         class="top-icon" alt="Back" onclick="goBack()">
</div>


<script>
function openImage(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = src;
    lb.style.display = 'flex';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
}

function goBack(){
  history.back();
}

function goHome(){
  window.location.href = "/menu";
}
</script>

<a href="/admin" class="admin-btn" title="Admin">
    <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
</a>
<script src="/static/js/drag-scroll.js"></script>
</body>
</html>
