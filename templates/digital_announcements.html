<!DOCTYPE html>
<html>
<head>

    <style>
        @font-face {
            font-family: 'League Spartan';
            src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
        }

        body {
            margin: 0;
            font-family: 'League Spartan', sans-serif;
            background: url("/static/images/KIOSK BACKGROUND.png") no-repeat center center fixed;
            background-size: cover
        }

        .title {
            text-align: center;
            font-size: 70px;
            font-weight: 900;
            color: #8b2e2e;
            text-shadow: 2px 2px 0 black;
            letter-spacing: 5px;
            margin-top: 60px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            padding: 40px;
        }

        .card {
            cursor: pointer;
            text-align: center;
        }

        .card p {
            font-weight: 900;
            font-size: 18px;
            margin-top: 10px;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .top-icons {
  position: fixed;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 12px;
  z-index: 1000;
}

.top-icon {
  width: 50px;
  height: 50px;
  padding: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.top-icon:hover {
  transform: scale(1.1);
  background: #8b2e2e;
}

</style>

</head>

<body>
    <h1 class="title">DIGITAL ANNOUNCEMENTS</h1>

<div class="grid">
    {% for a in announcements %}
    <div class="card" onclick="openPDF('{{ a.file }}')">
        <img src="{{ url_for('static', filename=a.thumbnail) }}">
        <p>{{ a.title }}</p>
    </div>
    {% endfor %}
</div>

<div class="top-icons">
    <img src="{{ url_for('static', filename='images/icon/back_button.png') }}" 
         class="top-icon" onclick="goBack()">

    <img src="{{ url_for('static', filename='images/icon/home_button.png') }}" 
         class="top-icon" onclick="goHome()">
</div>


<script>
function openPDF(file){
    window.location.href = "/announcement-view?file=" + file;
}

function goBack(){
  window.history.back();
}

function goHome(){
  window.location.href = "/";
}
</script>

</body>
</html>
