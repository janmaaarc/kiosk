<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        @font-face {
            font-family: 'League Spartan';
            src: url('/static/font/LeagueSpartan-VariableFont_wght.ttf');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'League Spartan', sans-serif;
            background: url("{{ url_for('static', filename='images/KIOSK BACKGROUND.png') }}") no-repeat center center fixed;
            background-size: cover;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .title {
            margin-top: 50px;
            font-size: 90px;
            font-weight: 900;
            color: #8b2e2e;
            text-shadow: 2px 2px 0 black;
            letter-spacing: 10px;
            flex-shrink: 0;
            line-height: 1;
        }

        .menu-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            padding: 12px 80px 30px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            align-content: center;
        }

        .menu-card {
            background: rgba(255,255,255,0.9);
            border-radius: 25px;
            padding: 22px 20px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .menu-card img {
            width: 75px;
            margin-bottom: 8px;
            transition: filter 0.3s;
        }

        .menu-card h2 {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .menu-card:hover,
        .menu-card:active {
            transform: scale(1.05);
            background: #8b4a46;
            color: white;
        }

        .menu-card:hover img,
        .menu-card:active img {
            filter: invert(1);
        }

        .menu-card:hover h2,
        .menu-card:active h2 {
            color: white;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .admin-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.18);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 100;
            text-decoration: none;
        }
        .admin-btn:hover { background: rgba(0,0,0,0.4); }
        .admin-btn svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.7); }

        .logout-btn {
            position: fixed;
            bottom: 18px;
            left: 18px;
            padding: 10px 22px;
            background: rgba(123,45,45,0.85);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-family: 'League Spartan', sans-serif;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 100;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(123,45,45,1); }

        .restricted-notice {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #7b2d2d;
            color: #fff;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            animation: fadeOut 4s forwards;
        }
        @keyframes fadeOut {
            0%,70% { opacity:1; } 100% { opacity:0; pointer-events:none; }
        }

        .user-greeting {
            font-size: 22px;
            font-weight: 700;
            color: #7b2d2d;
            letter-spacing: 2px;
            margin-top: 6px;
            margin-bottom: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }
        .role-tag {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .role-faculty { background: #7b2d2d; color: #fff; }
        .role-student { background: #1a5c8a; color: #fff; }
        .role-visitor { background: #555;    color: #fff; }
    </style>
</head>

<body>

    <h1 class="title">MENU</h1>
    <p class="user-greeting" id="userGreeting"></p>

    <div class="menu-container">

        <a href="/faculty">
            <div class="menu-card">
                <img src="{{ url_for('static', filename='images/icon/faculty_sched.png') }}" alt="">
                <h2>FACULTY</h2>
            </div>
        </a>

        <a href="/campus">
            <div class="menu-card">
                <img src="{{ url_for('static', filename='images/icon/campus_map.png') }}" alt="">
                <h2>CAMPUS MAP</h2>
            </div>
        </a>

        <a href="/office-selection">
            <div class="menu-card">
                <img src="{{ url_for('static', filename='images/icon/office_info.png') }}" alt="">
                <h2>OFFICE INFORMATION</h2>
            </div>
        </a>

        <a href="/announcements">
            <div class="menu-card">
                <img src="{{ url_for('static', filename='images/icon/digital_announcements.png') }}" alt="">
                <h2>DIGITAL ANNOUNCEMENT</h2>
            </div>
        </a>

        <a href="/events">
            <div class="menu-card">
                <img src="{{ url_for('static', filename='images/icon/events_and_acts.png') }}" alt="">
                <h2>EVENTS AND ACTIVITIES</h2>
            </div>
        </a>

        <a href="/about">
            <div class="menu-card">
                <img src="{{ url_for('static', filename='images/icon/about_us.png') }}" alt="">
                <h2>ABOUT US</h2>
            </div>
        </a>

    </div>

    <a href="/logout" class="logout-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#fff"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        LOGOUT
    </a>

<script>
(function() {
  try {
    const u = JSON.parse(localStorage.getItem('rfid_user'));
    if (u && u.name) {
      const ROLES = ['faculty', 'student', 'visitor'];
      const rawRole = (u.role || 'visitor').toLowerCase();
      const role  = ROLES.includes(rawRole) ? rawRole : 'visitor';
      const el    = document.getElementById('userGreeting');
      el.textContent = 'Welcome, ' + u.name;
      const tag = document.createElement('span');
      tag.className = 'role-tag role-' + role;
      tag.textContent = u.role.toUpperCase();
      el.appendChild(tag);
    }
  } catch(e) {}

  const params = new URLSearchParams(window.location.search);
  if (params.get('restricted') === 'faculty') {
    const n = document.createElement('div');
    n.className = 'restricted-notice';
    n.textContent = 'Faculty schedules are only accessible to students and faculty.';
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 4200);
  }
})();
</script>
</body>
</html>
